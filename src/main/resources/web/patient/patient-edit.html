<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>New Patient</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
        .form-error {
            color: #dc3545;
            font-size: 12px;
            margin-top: 4px;
            display: none;
        }
        .form-error.show {
            display: block;
        }
        .error-summary {
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: none;
        }
        .error-summary.show {
            display: block;
        }
        .error-summary ul {
            margin: 0;
            padding-left: 20px;
        }
        .success-message {
            background-color: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: none;
        }
        .success-message.show {
            display: block;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group.invalid input,
        .form-group.invalid select,
        .form-group.invalid textarea {
            border-color: #dc3545;
        }
        #panelList {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 10px;
        }
        #panelList > div {
            margin-bottom: 0;
        }
    </style>
</head>
<body class="full-page">

<div class="page-content">
    <h2>New Patient</h2>
    <div class="subtitle">Add patient details</div>

    <div id="errorSummary" class="error-summary"></div>
    <div id="successMessage" class="success-message"></div>

    <form id="patientForm">
        <div class="form-group">
            <label>Referred By</label>
            <select name="referring_doctor_id" id="referringDoctorSelect">
                <option value="">Select (Optional)</option>
            </select>
        </div>

        <div class="form-group">
            <label>Name *</label>
            <input type="text" name="name" required>
            <div class="form-error" id="error-name"></div>
        </div>

        <div class="form-group">
            <label>Date of Birth</label>
            <input type="date" name="dob">
            <div class="form-error" id="error-dob"></div>
        </div>

        <div class="form-group">
            <label>Gender</label>
            <select name="gender">
                <option value="">Select (Optional)</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>
            <div class="form-error" id="error-gender"></div>
        </div>

        <div class="form-group">
            <label>Phone</label>
            <input type="tel" name="contact_phone" placeholder="10-digit number">
            <div class="form-error" id="error-contact_phone"></div>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="contact_email">
            <div class="form-error" id="error-contact_email"></div>
        </div>

        <div class="form-group">
            <label>Address</label>
            <textarea name="address"></textarea>
        </div>

        
        <h3 style="margin-top: 40px;">Test Orders (Optional)</h3>
        <div style="margin-bottom: 12px;">
            <label>Priority</label>
            <select id="orderPriority">
                <option value="Routine">Routine</option>
                <option value="Urgent">Urgent</option>
            </select>
        </div>

        <div style="margin-bottom: 12px;">
            <label>Notes</label>
            <textarea id="orderNotes" placeholder="Optional notes for test order"></textarea>
        </div>

        <div style="margin-bottom: 12px;">
            <label>Select Tests/Panels</label>
            <div id="panelList" style="border: 1px solid #ddd; padding: 10px; border-radius: 4px; max-height: 200px; overflow-y: auto;">
                <div style="text-align: center; color: #999;">Loading panels...</div>
            </div>
        </div>
        
        <button type="submit">Save Patient</button>
    </form>
</div>

<script>
let currentUserId = 1; // Default user ID - should be from session

document.addEventListener('DOMContentLoaded', function() {
    loadDoctors();
    loadPanels();
});

function loadDoctors() {
    fetch('/api/doctors', {
        method: 'GET',
        credentials: 'include',
        headers: {
            'Content-Type': 'application/json'
        }
    })
    .then(response => response.json())
    .then(doctors => {
        displayDoctors(doctors);
    })
    .catch(error => {
        console.error('Error loading doctors:', error);
    });
}

function displayDoctors(doctors) {
    const doctorSelect = document.getElementById('referringDoctorSelect');
    
    if (!doctors || doctors.length === 0) {
        return;
    }

    doctors.forEach(doctor => {
        const option = document.createElement('option');
        option.value = doctor.id;
        option.textContent = doctor.full_name || doctor.name || 'Unknown';
        doctorSelect.appendChild(option);
    });
}

function loadPanels() {
    fetch('/api/panels', {
        method: 'GET',
        credentials: 'include',
        headers: {
            'Content-Type': 'application/json'
        }
    })
    .then(response => response.json())
    .then(panels => {
        displayPanels(panels);
    })
    .catch(error => {
        console.error('Error loading panels:', error);
        document.getElementById('panelList').innerHTML = '<div style="color: #dc3545;">Error loading panels</div>';
    });
}

function displayPanels(panels) {
    const panelList = document.getElementById('panelList');
    panelList.innerHTML = '';
    
    if (!panels || panels.length === 0) {
        panelList.innerHTML = '<div style="color: #999;">No panels available</div>';
        return;
    }

    panels.forEach(panel => {
        const panelId = panel.panel_id || panel.id;
        const panelName = panel.panel_name || 'Unknown';
        
        const checkbox = document.createElement('div');
        checkbox.innerHTML = `
            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                <input type="checkbox" name="order_panels" value="${panelId}">
                <span>${panelName}</span>
            </label>
        `;
        panelList.appendChild(checkbox);
    });
}

document.getElementById('patientForm').addEventListener('submit', function(event) {
    event.preventDefault();
    submitPatient();
});

function submitPatient() {
    // Clear previous errors
    clearErrors();

    // Collect form data
    const formData = new FormData(document.getElementById('patientForm'));
    
    const request = {
        name: formData.get('name') || null,
        dob: formData.get('dob') || null,
        gender: formData.get('gender') || null,
        contact_phone: formData.get('contact_phone') || null,
        contact_email: formData.get('contact_email') || null,
        address: formData.get('address') || null,
        referring_doctor_id: formData.get('referring_doctor_id') ? parseInt(formData.get('referring_doctor_id')) : null,
        created_by: currentUserId,
        priority: document.getElementById('orderPriority').value || 'Routine',
        notes: document.getElementById('orderNotes').value || null,
        order_panels: getSelectedPanels()
    };

    console.log('Submitting patient request:', request);

    fetch('/api/patients', {
        method: 'POST',
        credentials: 'include',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify(request)
    })
    .then(response => response.json())
    .then(response => {
        console.log('Response:', response);
        
        if (!response.validationResult.valid) {
            showErrors(response.validationResult.errors);
            return;
        }

        // Show success message
        showSuccessMessage('Patient created successfully!');
        
        // Log SQL transaction and created objects
        console.log('SQL Transaction:', response.sqlTransaction);
        console.log('Created Objects:', response.createdObjects);

        // Reset form
        setTimeout(() => {
            document.getElementById('patientForm').reset();
            clearSelectedPanels();
            document.getElementById('successMessage').classList.remove('show');
            // Redirect or do something else
        }, 2000);
    })
    .catch(error => {
        console.error('Error submitting patient:', error);
        showErrors(['An error occurred while creating the patient']);
    });
}

function getSelectedPanels() {
    const checkboxes = document.querySelectorAll('input[name="order_panels"]:checked');
    const panels = [];
    checkboxes.forEach(checkbox => {
        panels.push(parseInt(checkbox.value));
    });
    return panels;
}

function clearSelectedPanels() {
    const checkboxes = document.querySelectorAll('input[name="order_panels"]');
    checkboxes.forEach(checkbox => {
        checkbox.checked = false;
    });
}

function clearErrors() {
    // Clear error summary
    const errorSummary = document.getElementById('errorSummary');
    errorSummary.classList.remove('show');
    errorSummary.innerHTML = '';

    // Clear field errors
    document.querySelectorAll('.form-error').forEach(error => {
        error.classList.remove('show');
        error.innerHTML = '';
    });

    // Remove invalid class from form groups
    document.querySelectorAll('.form-group').forEach(group => {
        group.classList.remove('invalid');
    });
}

function showErrors(errors) {
    const errorSummary = document.getElementById('errorSummary');
    const errorList = errors.map(e => `<li>${e}</li>`).join('');
    errorSummary.innerHTML = `<ul>${errorList}</ul>`;
    errorSummary.classList.add('show');

    // Also try to match errors to fields
    const errorMap = {
        'Name is required': 'name',
        'DOB must be in YYYY-MM-DD format': 'dob',
        'Gender must be': 'gender',
        'Phone must be': 'contact_phone',
        'Email format is invalid': 'contact_email'
    };

    errors.forEach(error => {
        for (const [key, fieldName] of Object.entries(errorMap)) {
            if (error.includes(key)) {
                const errorElement = document.getElementById(`error-${fieldName}`);
                if (errorElement) {
                    errorElement.innerHTML = error;
                    errorElement.classList.add('show');
                    const formGroup = errorElement.closest('.form-group');
                    if (formGroup) {
                        formGroup.classList.add('invalid');
                    }
                }
            }
        }
    });

    // Scroll to error
    window.scrollTo(0, 0);
}

function showSuccessMessage(message) {
    const successDiv = document.getElementById('successMessage');
    successDiv.innerHTML = message;
    successDiv.classList.add('show');
}
</script>

</body>
</html>
