<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>New Patient</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body class="full-page">

<div class="page-content">
    <h2>New Patient</h2>
    <div class="subtitle">Add patient details</div>

    <form id="patientForm">
        <label>Referred By</label>
        <select name="referredBy" required>
            <option value="">Select</option>
            <option value="Self">Self</option>
            <option value="Dr. A. Kalam">Dr. A. Kalam</option>
        </select>

        <label>Name</label>
        <input type="text" name="name" required>

        <label>Date of Birth</label>
        <input type="date" name="dob" required>

        <label>Gender</label>
        <select name="gender" required>
            <option value="">Select</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
        </select>

        <label>Phone</label>
        <input type="tel" name="phone" required pattern="^\d{10}$" maxlength="10">

        <label>Address</label>
        <textarea name="address"></textarea>

        <label>Email</label>
        <input type="email" name="email">

        <button type="submit">Save Patient</button>
    </form>

    <h3 style="margin-top: 40px;">Tests Performed</h3>
    <div style="margin-bottom: 12px;">
        <button type="button" onclick="addTestRow()">Add Test</button>
    </div>

    <table id="testTable">
        <thead>
            <tr>
                <th>Test</th>
                <th>Result</th>
                <th>Normal Range</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td><input type="text" value="Complete Blood Count"></td>
                <td><input type="text" value="8.1" oninput="evaluateRange(this)"></td>
                <td><input type="text" value="12-18" oninput="evaluateRange(this)"></td>
                <td><button type="button" onclick="removeRow(this)">Remove</button></td>
            </tr>
        </tbody>
    </table>
</div>

<script>
function parseRange(range) {
    const match = range.match(/^(\d+(?:\.\d+)?)\s*-\s*(\d+(?:\.\d+)?)/);
    if (!match) return null;
    return { min: parseFloat(match[1]), max: parseFloat(match[2]) };
}

function evaluateRange(input) {
    const row = input.closest('tr');
    const resultInput = row.querySelector('td:nth-child(2) input');
    const rangeInput = row.querySelector('td:nth-child(3) input');

    const result = parseFloat(resultInput.value);
    const range = parseRange(rangeInput.value);

    row.classList.remove('out-of-range');
    if (!isNaN(result) && range) {
        if (result < range.min || result > range.max) {
            row.classList.add('out-of-range');
        }
    }
}

function addTestRow() {
    const tbody = document.getElementById('testTable').querySelector('tbody');
    const row = document.createElement('tr');

    row.innerHTML = `
        <td><input type="text"></td>
        <td><input type="text" oninput="evaluateRange(this)"></td>
        <td><input type="text" oninput="evaluateRange(this)"></td>
        <td><button type="button" onclick="removeRow(this)">Remove</button></td>
    `;

    tbody.appendChild(row);
}

function removeRow(button) {
    const row = button.closest('tr');
    row.remove();
}

// Attach handler to patient form to prevent real submission for demo
document.getElementById('patientForm').addEventListener('submit', function(event) {
    event.preventDefault();
    alert('Patient saved (demo)');
});
</script>
</body>
</html>

</body>
</html>
