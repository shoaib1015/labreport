<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Test Entry</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal {
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            max-width: 1000px;
            width: 95%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px;
            border-bottom: 1px solid #e8f0f8;
            position: sticky;
            top: 0;
            background-color: white;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 600;
            color: #2c5282;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            color: #999;
            cursor: pointer;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            color: #333;
        }

        .modal-content {
            padding: 24px;
        }

        .form-section {
            margin-bottom: 24px;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 16px;
            align-items: center;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-label {
            font-weight: 600;
            color: #2c5282;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-control {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
        }

        .form-control:focus {
            outline: none;
            border-color: #2c5282;
            box-shadow: 0 0 4px rgba(44, 82, 130, 0.2);
        }

        .form-control-readonly {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
            background-color: #f0f4f8;
            color: #2c5282;
            font-weight: 500;
        }

        select.form-control {
            cursor: pointer;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #2c5282;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid #e8f0f8;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        table thead {
            background-color: #f8f9fa;
        }

        table th {
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #2c5282;
            border-bottom: 2px solid #e8f0f8;
            font-size: 13px;
        }

        table td {
            padding: 12px;
            border-bottom: 1px solid #f0f0f0;
        }

        .out-of-range {
            background-color: #fff1f0;
            color: #b22222;
            font-weight: 700;
        }

        .input-field {
            width: 100%;
        }

        .patient-info-display {
            background-color: #f8f9fa;
            padding: 12px;
            border-radius: 4px;
            font-size: 14px;
            display: flex;
            gap: 20px;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-label {
            font-weight: 600;
            color: #2c5282;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            padding: 20px 24px;
            border-top: 1px solid #e8f0f8;
            background-color: #f8f9fa;
            position: sticky;
            bottom: 0;
        }

        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background-color: #2c5282;
            color: white;
        }

        .btn-primary:hover {
            background-color: #1e3f5a;
        }

        .btn-secondary {
            background-color: white;
            color: #2c5282;
            border: 1px solid #2c5282;
        }

        .btn-secondary:hover {
            background-color: #f0f0f0;
        }

        .form-row-wide {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        textarea.form-control {
            resize: vertical;
            min-height: 80px;
            font-family: inherit;
        }
    </style>
</head>

<body>
    <div class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">Patient Test Entry</div>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>

            <div class="modal-content">
                <!-- Patient Selection & Info -->
                <div class="form-section">
                    <div class="form-row">
                        <div class="form-group" style="grid-column: span 2;">
                            <label class="form-label">Select Patient:</label>
                            <div id="patientNameDisplay" class="form-control-readonly">Loading...</div>
                        </div>
                    </div>
                    <div class="patient-info-display" id="patientInfo" style="display: none;">
                        <div class="info-item">
                            <span class="info-label">Age:</span>
                            <span id="infoAge">-</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Gender:</span>
                            <span id="infoGender">-</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Contact:</span>
                            <span id="infoContact">-</span>
                        </div>
                    </div>
                </div>

                <!-- Referring Doctor & Panel -->
                <div class="form-section">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Referring Doctor:</label>
                            <div id="doctorNameDisplay" class="form-control-readonly">-</div>
                        </div>
                        <div class="form-group" style="grid-column: span 3;">
                            <label class="form-label">Select Test Panel *</label>
                            <select id="panelSelect" class="form-control" onchange="onPanelChange()" required>
                                <option value="">Select panel</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Test Components Table -->
                <div class="form-section">
                    <div class="section-title">Test Components</div>
                    <table>
                        <thead>
                            <tr>
                                <th>Test Component</th>
                                <th>Unit</th>
                                <th>Normal Range</th>
                                <th>Result</th>
                                <th>Remarks</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="componentsTable">
                            <tr>
                                <td colspan="6" style="text-align: center; color: #999;">Select a test panel to view components</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Sample Collection Date -->
                <div class="form-section">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Sample Collected:</label>
                            <div style="display: flex; gap: 8px;">
                                <input type="date" id="sampleDate" class="form-control" style="flex: 1;">
                                <button class="btn btn-secondary" onclick="setToday()"
                                    style="padding: 10px 16px;">&#x1F4C5;</button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Report Status:</label>
                            <select id="reportStatus" class="form-control">
                                <!-- <option>Pending</option>
                                <option>In Progress</option> -->
                                <option>Ready</option>
                                <!-- <option>Delivered</option> -->
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Notes/Comments -->
                <div class="form-section">
                    <div class="form-row-wide">
                        <div class="form-group">
                            <label class="form-label">Notes / Comments:</label>
                            <textarea id="notes" class="form-control"
                                placeholder="Enter any additional notes"></textarea>
                        </div>
                    </div>
                </div>
            </div>

            <div class="modal-footer">
                <!-- <button class="btn btn-secondary" onclick="printReport()">Print Report</button> -->
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveTestEntry()">Save Test Entry</button>
            </div>
        </div>
    </div>

    <script>
        let currentPatientId = null;
        // Stores all test order data grouped by orderId
        // { orderId: { panelName, sampleCollectedAt, status, notes, components: [...] } }
        let testOrdersMap = {};
        // IDs of components removed by user during this session
        let removedComponentIds = [];

        document.addEventListener('DOMContentLoaded', function () {
            const urlParams = new URLSearchParams(window.location.search);
            currentPatientId = urlParams.get('patientId');
            console.log('Current Patient ID:', currentPatientId);

            if (currentPatientId) {
                loadPatientInfo(currentPatientId);
                loadTestOrders(currentPatientId);
            } else {
                document.getElementById('patientNameDisplay').textContent = 'No patient ID provided';
            }
        });

        function closeModal() {
            window.history.back();
        }

        /**
         * Fetch patient details (name, dob, gender, contact, referring doctor)
         * using GET /api/patients/{id}
         */
        function loadPatientInfo(patientId) {
            fetch('/api/patients/' + patientId)
                .then(function(response) { return response.json(); })
                .then(function(data) {
                    console.log('Patient data:', data);

                    // Display patient name
                    document.getElementById('patientNameDisplay').textContent = data.name || '-';

                    // Display referring doctor name (joined from referring_doctors table)
                    var docName = data.referring_doctor_name;
                    document.getElementById('doctorNameDisplay').textContent = docName && docName !== '-' ? docName : '-';
                    // If server didn't provide a referring doctor name but we have an id, fetch it
                    if ((!docName || docName === '-' || docName === 'null') && data.referring_doctor_id) {
                        var refId = data.referring_doctor_id;
                        // Some endpoints return '0' for null; ignore 0
                        if (String(refId) !== '0') {
                            fetch('/api/doctors/' + refId)
                                .then(function(resp) { return resp.json(); })
                                .then(function(doctor) {
                                    if (doctor && doctor.full_name) {
                                        document.getElementById('doctorNameDisplay').textContent = doctor.full_name;
                                    }
                                })
                                .catch(function(err) { console.warn('Failed to fetch doctor name', err); });
                        }
                    }

                    // Display patient info bar
                    var age = calculateAge(data.dob);
                    document.getElementById('patientInfo').style.display = 'flex';
                    document.getElementById('infoAge').textContent = age;
                    document.getElementById('infoGender').textContent = data.gender || '-';
                    document.getElementById('infoContact').textContent = data.contact_phone || '-';
                })
                .catch(function(error) {
                    console.error('Error loading patient:', error);
                    document.getElementById('patientNameDisplay').textContent = 'Error loading patient';
                });
        }

        /**
         * Fetch test orders with components for this patient.
         * API returns nested structure with orders containing components array.
         */
        function loadTestOrders(patientId) {
            fetch('/api/patients/' + patientId + '/test-orders')
                .then(function(response) { return response.json(); })
                .then(function(data) {
                    console.log('Test orders data:', data);
                    var orders = data.testOrders || [];

                    // Process nested order structure
                    testOrdersMap = {};
                    orders.forEach(function(order) {
                        var orderId = order.id;
                        var notes = order.notes || '';
                        // Ensure 'null' string is converted to empty string
                        if (notes === 'null' || notes === null || notes === undefined) {
                            notes = '';
                        }
                        testOrdersMap[orderId] = {
                            panelName: order.panelName,
                            panelId: order.panelId,
                            sampleCollectedAt: order.sampleCollectedAt,
                            status: order.status,
                            notes: notes,
                            components: []
                        };

                        // Map each component from the nested array
                        if (Array.isArray(order.components)) {
                            order.components.forEach(function(component) {
                                testOrdersMap[orderId].components.push({
                                    id: component.id || component.component_row_id || 0,
                                    componentId: component.component_id || 0,
                                    name: component.component_name || '',
                                    unit: component.unit || '',
                                    referenceRange: component.reference_range || '',
                                    resultValue: component.result_value || '',
                                    flag: component.flag || 'Normal'
                                });
                            });
                        }
                    });

                    // Populate panel dropdown
                    var panelSelect = document.getElementById('panelSelect');
                    panelSelect.innerHTML = '<option value="">Select panel</option>';

                    var orderIds = Object.keys(testOrdersMap);
                    orderIds.forEach(function(orderId) {
                        var order = testOrdersMap[orderId];
                        var option = document.createElement('option');
                        option.value = orderId;
                        // If panelName is missing, try to resolve via panelId
                        if (order.panelName && order.panelName !== 'null' && order.panelName.trim() !== '') {
                            option.textContent = order.panelName;
                        } else if (order.panelId) {
                            option.textContent = 'Panel ' + order.panelId;
                            // async fetch to get real panel name
                            (function(opt, pid, oid) {
                                fetch('/api/panels/' + pid)
                                    .then(function(resp) { return resp.json(); })
                                    .then(function(panelData) {
                                        if (panelData && panelData.panel_name) {
                                            opt.textContent = panelData.panel_name;
                                            // Also update stored panelName
                                            if (testOrdersMap[oid]) testOrdersMap[oid].panelName = panelData.panel_name;
                                        }
                                    })
                                    .catch(function(err) { console.warn('Failed to fetch panel name for id ' + pid, err); });
                            })(option, order.panelId, orderId);
                        } else {
                            option.textContent = 'Unknown Panel';
                        }
                        panelSelect.appendChild(option);
                    });

                    // Auto-select first panel if available
                    if (orderIds.length > 0) {
                        panelSelect.value = orderIds[0];
                        onPanelChange();
                    }
                })
                .catch(function(error) { console.error('Error loading test orders:', error); });
        }

        /**
         * When a panel (test order) is selected, render its components in the table
         * and populate the form fields with the test order data.
         */
        function onPanelChange() {
            var panelSelect = document.getElementById('panelSelect');
            var orderId = panelSelect.value;
            var tbody = document.getElementById('componentsTable');

            // Reset removed component tracking when switching panels
            removedComponentIds = [];

            if (!orderId || !testOrdersMap[orderId]) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: #999;">Select a test panel to view components</td></tr>';
                return;
            }

            var order = testOrdersMap[orderId];

            // Populate sample date, status, notes from the test order
            if (order.sampleCollectedAt) {
                var dateValue = order.sampleCollectedAt.substring(0, 10);
                document.getElementById('sampleDate').value = dateValue;
            } else {
                document.getElementById('sampleDate').value = '';
            }

            // if (order.status) {
            //     document.getElementById('reportStatus').value = order.status;
            // }

            // Ensure notes is never 'null' string
            var notesValue = order.notes || '';
            if (notesValue === 'null' || notesValue === null || notesValue === undefined) {
                notesValue = '';
            }
            document.getElementById('notes').value = notesValue;

            getPanelComponentsForOrder(order)
                .then(function (components) {
                    order.components = components;
                    renderComponentsTable(components);
                })
                .catch(function (error) {
                    console.warn('Failed to load components for selected panel:', error);
                    renderComponentsTable(order.components || []);
                });
        }

        function getPanelComponentsForOrder(order) {
            if (!order.panelId) {
                return Promise.resolve(order.components || []);
            }

            return fetch('/api/components/panel/' + order.panelId)
                .then(function(response) {
                    if (!response.ok) {
                        throw new Error('Failed to fetch panel components');
                    }
                    return response.json();
                })
                .then(function(masterComponents) {
                    if (!Array.isArray(masterComponents)) {
                        return order.components || [];
                    }

                    var existingById = {};
                    var existingByName = {};
                    (order.components || []).forEach(function(comp) {
                        if (comp.id) {
                            existingById[comp.id] = comp;
                        }
                        if (comp.componentId) {
                            existingByName[comp.componentId] = comp;
                        }
                        if (comp.name) {
                            existingByName[comp.name] = comp;
                        }
                    });

                    var merged = masterComponents.map(function(master) {
                        var existing = null;
                        if (master.component_id && existingByName[master.component_id]) {
                            existing = existingByName[master.component_id];
                        } else if (existingByName[master.component_name]) {
                            existing = existingByName[master.component_name];
                        }

                        return {
                            id: existing ? existing.id : 0,
                            componentId: master.component_id || 0,
                            name: master.component_name || '',
                            unit: master.unit || '',
                            referenceRange: master.normal_range || '',
                            resultValue: existing ? existing.resultValue : '',
                            flag: existing ? existing.flag : 'Normal'
                        };
                    });

                    (order.components || []).forEach(function(comp) {
                        if (comp.id && !merged.some(function(item) { return item.id === comp.id; })) {
                            merged.push(comp);
                        }
                    });

                    return merged;
                })
                .catch(function(error) {
                    console.warn('Failed to fetch master components for panel ID ' + order.panelId + ':', error);
                    return order.components || [];
                });
        }

        function renderComponentsTable(components) {
            var tbody = document.getElementById('componentsTable');
            tbody.innerHTML = '';

            if (!components || components.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: #999;">No components available for this panel.</td></tr>';
                return;
            }

            components.forEach(function(comp) {
                var tr = document.createElement('tr');

                var tdName = document.createElement('td');
                tdName.textContent = comp.name;

                var tdUnit = document.createElement('td');
                tdUnit.textContent = comp.unit;

                var tdRange = document.createElement('td');
                tdRange.textContent = comp.referenceRange;

                var tdResult = document.createElement('td');
                var resultInput = document.createElement('input');
                resultInput.type = 'text';
                resultInput.className = 'form-control input-field';
                resultInput.setAttribute('data-component-id', String(comp.id));
                resultInput.setAttribute('data-component-master-id', String(comp.componentId || 0));
                resultInput.setAttribute('data-component-name', comp.name);
                resultInput.setAttribute('data-reference-range', comp.referenceRange);
                resultInput.setAttribute('data-unit', comp.unit);
                resultInput.value = comp.resultValue || '';
                resultInput.placeholder = 'Enter result';
                tdResult.appendChild(resultInput);

                var tdRemarks = document.createElement('td');
                var flagSelect = document.createElement('select');
                flagSelect.className = 'form-control input-field';
                flagSelect.setAttribute('data-component-id', String(comp.id));
                flagSelect.setAttribute('data-field', 'flag');

                ['Normal', 'High', 'Low'].forEach(function(opt) {
                    var optEl = document.createElement('option');
                    optEl.value = opt;
                    optEl.textContent = opt;
                    if (comp.flag === opt) {
                        optEl.selected = true;
                    }
                    flagSelect.appendChild(optEl);
                });
                tdRemarks.appendChild(flagSelect);

                var tdActions = document.createElement('td');
                var removeBtn = document.createElement('button');
                removeBtn.className = 'btn btn-secondary';
                removeBtn.style.padding = '6px 10px';
                removeBtn.textContent = 'Remove';
                removeBtn.addEventListener('click', function() {
                    onRemoveComponent(comp.id, tr);
                });
                tdActions.appendChild(removeBtn);

                resultInput.addEventListener('input', function() {
                    var val = resultInput.value.trim();
                    var range = resultInput.getAttribute('data-reference-range') || '';
                    if (isValueOutOfRange(val, range)) {
                        resultInput.classList.add('out-of-range');
                        try {
                            var numeric = parseFloat(val.replace(/,/g, '.'));
                            var bounds = parseRange(range);
                            if (bounds) {
                                if (bounds.min !== null && numeric < bounds.min) flagSelect.value = 'Low';
                                else if (bounds.max !== null && numeric > bounds.max) flagSelect.value = 'High';
                                else flagSelect.value = 'Normal';
                            } else {
                                flagSelect.value = 'High';
                            }
                        } catch (e) {
                            flagSelect.value = 'High';
                        }
                    } else {
                        resultInput.classList.remove('out-of-range');
                        flagSelect.value = 'Normal';
                    }
                });

                if (resultInput.value && resultInput.value.trim() !== '') {
                    resultInput.dispatchEvent(new Event('input'));
                }

                tr.appendChild(tdName);
                tr.appendChild(tdUnit);
                tr.appendChild(tdRange);
                tr.appendChild(tdResult);
                tr.appendChild(tdRemarks);
                tr.appendChild(tdActions);

                tbody.appendChild(tr);
            });
        }

        function onRemoveComponent(componentId, rowElement) {
            // Mark for deletion and remove row from DOM
            if (componentId && !isNaN(parseInt(componentId))) {
                removedComponentIds.push(parseInt(componentId));
            }
            if (rowElement && rowElement.parentNode) {
                rowElement.parentNode.removeChild(rowElement);
            }
        }

        function parseRange(rangeStr) {
            if (!rangeStr) return null;
            rangeStr = rangeStr.replace(/\s+/g, '');
            var m = rangeStr.match(/^([<>]=?)?([0-9]+(?:\.[0-9]+)?)\-?([0-9]*)(?:\s*(?:units)?)?$/);
            // Try simple min-max like 4-10
            if (m && rangeStr.indexOf('-') !== -1) {
                var parts = rangeStr.split('-');
                var min = parseFloat(parts[0].replace(',', '.'));
                var max = parseFloat(parts[1].replace(',', '.'));
                if (!isNaN(min) && !isNaN(max)) return {min: min, max: max};
            }
            // Try >= or <=
            var g = rangeStr.match(/^(>=|>)?([0-9]+(?:\.[0-9]+)?)/);
            if (g) {
                var num = parseFloat(g[2].replace(',', '.'));
                if (g[1] === '>' || g[1] === '>=') return {min: num, max: null};
            }
            return null;
        }

        function isValueOutOfRange(valueStr, rangeStr) {
            if (!valueStr || valueStr === '') return false;
            var num = parseFloat(valueStr.replace(/,/g, '.'));
            if (isNaN(num)) return false;
            var bounds = parseRange(rangeStr);
            if (!bounds) return false;
            if (bounds.min !== null && num < bounds.min) return true;
            if (bounds.max !== null && num > bounds.max) return true;
            return false;
        }

        function setToday() {
            var today = new Date().toISOString().split('T')[0];
            document.getElementById('sampleDate').value = today;
        }

        /**
         * Save test entry:
         * - Updates test_order: sample_collected_at, status, notes, updated_at
         * - Updates test_order_component: result_value, flag, updated_at
         */
        function saveTestEntry() {
            var panelSelect = document.getElementById('panelSelect');
            var testOrderId = panelSelect.value;

            if (!testOrderId) {
                alert('Please select a test panel');
                return;
            }

            if (!currentPatientId) {
                alert('No patient selected');
                return;
            }

            // Collect component results from the table
            var components = [];
            var rows = document.querySelectorAll('#componentsTable tr');
            rows.forEach(function(row) {
                var resultInput = row.querySelector('input[data-component-id]');
                var flagSelect = row.querySelector('select[data-field="flag"]');
                if (resultInput && flagSelect) {
                    var componentId = resultInput.getAttribute('data-component-id');
                    var componentMasterId = resultInput.getAttribute('data-component-master-id');
                    components.push({
                        id: isNaN(parseInt(componentId)) ? 0 : parseInt(componentId),
                        componentId: isNaN(parseInt(componentMasterId)) ? 0 : parseInt(componentMasterId),
                        componentName: resultInput.getAttribute('data-component-name') || '',
                        unit: resultInput.getAttribute('data-unit') || '',
                        referenceRange: resultInput.getAttribute('data-reference-range') || '',
                        resultValue: resultInput.value || '',
                        flag: flagSelect.value
                    });
                }
            });

            // Ensure notes is never 'null' string
            var notes = document.getElementById('notes').value || '';
            if (notes === 'null' || notes === null) {
                notes = '';
            }

            var payload = {
                testOrderId: parseInt(testOrderId) || 0,
                sampleCollectedAt: document.getElementById('sampleDate').value,
                status: document.getElementById('reportStatus').value,
                notes: notes,
                components: components,
                removedComponentIds: removedComponentIds
            };

            console.log('Saving test entry:', payload);

            fetch('/api/patients/' + currentPatientId + '/test-entry', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
                .then(function(response) { return response.json(); })
                .then(function(data) {
                    if (data.success) {
                        alert('Test entry saved successfully!');
                        // Reload test orders to reflect updated data
                        loadTestOrders(currentPatientId);
                    } else {
                        alert('Failed to save: ' + (data.error || 'Unknown error'));
                    }
                })
                .catch(function(error) {
                    console.error('Error saving test entry:', error);
                    alert('Error saving test entry. Please try again.');
                });
        }

        function calculateAge(dob) {
            if (!dob) return '-';
            var birthDate = new Date(dob);
            var today = new Date();
            var age = today.getFullYear() - birthDate.getFullYear();
            var monthDiff = today.getMonth() - birthDate.getMonth();
            if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birthDate.getDate())) {
                age--;
            }
            return age;
        }
