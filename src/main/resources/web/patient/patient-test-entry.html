<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Test Entry</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal {
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            max-width: 1000px;
            width: 95%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px;
            border-bottom: 1px solid #e8f0f8;
            position: sticky;
            top: 0;
            background-color: white;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 600;
            color: #2c5282;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            color: #999;
            cursor: pointer;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            color: #333;
        }

        .modal-content {
            padding: 24px;
        }

        .form-section {
            margin-bottom: 24px;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 16px;
            align-items: center;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-label {
            font-weight: 600;
            color: #2c5282;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-control {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
        }

        .form-control:focus {
            outline: none;
            border-color: #2c5282;
            box-shadow: 0 0 4px rgba(44, 82, 130, 0.2);
        }

        .form-control-readonly {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
            background-color: #f0f4f8;
            color: #2c5282;
            font-weight: 500;
        }

        select.form-control {
            cursor: pointer;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #2c5282;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid #e8f0f8;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        table thead {
            background-color: #f8f9fa;
        }

        table th {
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #2c5282;
            border-bottom: 2px solid #e8f0f8;
            font-size: 13px;
        }

        table td {
            padding: 12px;
            border-bottom: 1px solid #f0f0f0;
        }

        .input-field {
            width: 100%;
        }

        .patient-info-display {
            background-color: #f8f9fa;
            padding: 12px;
            border-radius: 4px;
            font-size: 14px;
            display: flex;
            gap: 20px;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-label {
            font-weight: 600;
            color: #2c5282;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            padding: 20px 24px;
            border-top: 1px solid #e8f0f8;
            background-color: #f8f9fa;
            position: sticky;
            bottom: 0;
        }

        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background-color: #2c5282;
            color: white;
        }

        .btn-primary:hover {
            background-color: #1e3f5a;
        }

        .btn-secondary {
            background-color: white;
            color: #2c5282;
            border: 1px solid #2c5282;
        }

        .btn-secondary:hover {
            background-color: #f0f0f0;
        }

        .form-row-wide {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        textarea.form-control {
            resize: vertical;
            min-height: 80px;
            font-family: inherit;
        }
    </style>
</head>

<body>
    <div class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">Patient Test Entry</div>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>

            <div class="modal-content">
                <!-- Patient Selection & Info -->
                <div class="form-section">
                    <div class="form-row">
                        <div class="form-group" style="grid-column: span 2;">
                            <label class="form-label">Select Patient:</label>
                            <div id="patientNameDisplay" class="form-control-readonly">Loading...</div>
                        </div>
                    </div>
                    <div class="patient-info-display" id="patientInfo" style="display: none;">
                        <div class="info-item">
                            <span class="info-label">Age:</span>
                            <span id="infoAge">-</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Gender:</span>
                            <span id="infoGender">-</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Contact:</span>
                            <span id="infoContact">-</span>
                        </div>
                    </div>
                </div>

                <!-- Referring Doctor & Panel -->
                <div class="form-section">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Referring Doctor:</label>
                            <div id="doctorNameDisplay" class="form-control-readonly">-</div>
                        </div>
                        <div class="form-group" style="grid-column: span 3;">
                            <label class="form-label">Select Test Panel:</label>
                            <select id="panelSelect" class="form-control" onchange="onPanelChange()">
                                <option value="">Select panel</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Test Components Table -->
                <div class="form-section">
                    <div class="section-title">Test Components</div>
                    <table>
                        <thead>
                            <tr>
                                <th>Test Component</th>
                                <th>Unit</th>
                                <th>Normal Range</th>
                                <th>Result</th>
                                <th>Remarks</th>
                            </tr>
                        </thead>
                        <tbody id="componentsTable">
                            <tr>
                                <td colspan="5" style="text-align: center; color: #999;">Select a test panel to view components</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Sample Collection Date -->
                <div class="form-section">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Sample Collected:</label>
                            <div style="display: flex; gap: 8px;">
                                <input type="date" id="sampleDate" class="form-control" style="flex: 1;">
                                <button class="btn btn-secondary" onclick="setToday()"
                                    style="padding: 10px 16px;">&#x1F4C5;</button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Report Status:</label>
                            <select id="reportStatus" class="form-control">
                                <option>Pending</option>
                                <option>In Progress</option>
                                <option>Ready</option>
                                <option>Delivered</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Notes/Comments -->
                <div class="form-section">
                    <div class="form-row-wide">
                        <div class="form-group">
                            <label class="form-label">Notes / Comments:</label>
                            <textarea id="notes" class="form-control"
                                placeholder="Enter any additional notes"></textarea>
                        </div>
                    </div>
                </div>
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="printReport()">Print Report</button>
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveTestEntry()">Save Test Entry</button>
            </div>
        </div>
    </div>

    <script>
        let currentPatientId = null;
        // Stores all test order data grouped by orderId
        // { orderId: { panelName, sampleCollectedAt, status, notes, components: [...] } }
        let testOrdersMap = {};

        document.addEventListener('DOMContentLoaded', function () {
            const urlParams = new URLSearchParams(window.location.search);
            currentPatientId = urlParams.get('patientId');
            console.log('Current Patient ID:', currentPatientId);

            if (currentPatientId) {
                loadPatientInfo(currentPatientId);
                loadTestOrders(currentPatientId);
            } else {
                document.getElementById('patientNameDisplay').textContent = 'No patient ID provided';
            }
        });

        function closeModal() {
            window.history.back();
        }

        /**
         * Fetch patient details (name, dob, gender, contact, referring doctor)
         * using GET /api/patients/{id}
         */
        function loadPatientInfo(patientId) {
            fetch('/api/patients/' + patientId)
                .then(function(response) { return response.json(); })
                .then(function(data) {
                    console.log('Patient data:', data);

                    // Display patient name
                    document.getElementById('patientNameDisplay').textContent = data.name || '-';

                    // Display referring doctor name (joined from referring_doctors table)
                    document.getElementById('doctorNameDisplay').textContent = data.referring_doctor_name || '-';

                    // Display patient info bar
                    var age = calculateAge(data.dob);
                    document.getElementById('patientInfo').style.display = 'flex';
                    document.getElementById('infoAge').textContent = age;
                    document.getElementById('infoGender').textContent = data.gender || '-';
                    document.getElementById('infoContact').textContent = data.contact_phone || '-';
                })
                .catch(function(error) {
                    console.error('Error loading patient:', error);
                    document.getElementById('patientNameDisplay').textContent = 'Error loading patient';
                });
        }

        /**
         * Fetch test orders with components for this patient.
         * Groups the flat response by order_id and populates the panel dropdown.
         */
        function loadTestOrders(patientId) {
            fetch('/api/patients/' + patientId + '/test-orders')
                .then(function(response) { return response.json(); })
                .then(function(data) {
                    console.log('Test orders data:', data);
                    var orders = data.testOrders || [];

                    // Group by order_id
                    testOrdersMap = {};
                    orders.forEach(function(row) {
                        var orderId = row.id;
                        if (!testOrdersMap[orderId]) {
                            testOrdersMap[orderId] = {
                                panelName: row.panelName,
                                sampleCollectedAt: row.sampleCollectedAt,
                                status: row.status,
                                notes: row.notes,
                                components: []
                            };
                        }
                        testOrdersMap[orderId].components.push({
                            id: row.componentRowId,
                            name: row.componentName,
                            unit: row.unit || '',
                            referenceRange: row.referenceRange || '',
                            resultValue: row.resultValue || '',
                            flag: row.flag || 'Normal'
                        });
                    });

                    // Populate panel dropdown
                    var panelSelect = document.getElementById('panelSelect');
                    panelSelect.innerHTML = '<option value="">Select panel</option>';

                    var orderIds = Object.keys(testOrdersMap);
                    orderIds.forEach(function(orderId) {
                        var order = testOrdersMap[orderId];
                        var option = document.createElement('option');
                        option.value = orderId;
                        option.textContent = order.panelName;
                        panelSelect.appendChild(option);
                    });

                    // Auto-select first panel if available
                    if (orderIds.length > 0) {
                        panelSelect.value = orderIds[0];
                        onPanelChange();
                    }
                })
                .catch(function(error) { console.error('Error loading test orders:', error); });
        }

        /**
         * When a panel (test order) is selected, render its components in the table
         * and populate the form fields with the test order data.
         */
        function onPanelChange() {
            var panelSelect = document.getElementById('panelSelect');
            var orderId = panelSelect.value;
            var tbody = document.getElementById('componentsTable');

            if (!orderId || !testOrdersMap[orderId]) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: #999;">Select a test panel to view components</td></tr>';
                return;
            }

            var order = testOrdersMap[orderId];

            // Populate sample date, status, notes from the test order
            if (order.sampleCollectedAt) {
                var dateValue = order.sampleCollectedAt.substring(0, 10);
                document.getElementById('sampleDate').value = dateValue;
            } else {
                document.getElementById('sampleDate').value = '';
            }

            if (order.status) {
                document.getElementById('reportStatus').value = order.status;
            }

            if (order.notes) {
                document.getElementById('notes').value = order.notes;
            } else {
                document.getElementById('notes').value = '';
            }

            // Render component rows
            tbody.innerHTML = '';
            order.components.forEach(function(comp) {
                var tr = document.createElement('tr');

                var tdName = document.createElement('td');
                tdName.textContent = comp.name;

                var tdUnit = document.createElement('td');
                tdUnit.textContent = comp.unit;

                var tdRange = document.createElement('td');
                tdRange.textContent = comp.referenceRange;

                var tdResult = document.createElement('td');
                var resultInput = document.createElement('input');
                resultInput.type = 'text';
                resultInput.className = 'form-control input-field';
                resultInput.setAttribute('data-component-id', comp.id);
                resultInput.value = comp.resultValue;
                resultInput.placeholder = 'Enter result';
                tdResult.appendChild(resultInput);

                var tdRemarks = document.createElement('td');
                var flagSelect = document.createElement('select');
                flagSelect.className = 'form-control input-field';
                flagSelect.setAttribute('data-component-id', comp.id);
                flagSelect.setAttribute('data-field', 'flag');

                var options = ['Normal', 'High', 'Low'];
                options.forEach(function(opt) {
                    var optEl = document.createElement('option');
                    optEl.value = opt;
                    optEl.textContent = opt;
                    if (comp.flag === opt) {
                        optEl.selected = true;
                    }
                    flagSelect.appendChild(optEl);
                });
                tdRemarks.appendChild(flagSelect);

                tr.appendChild(tdName);
                tr.appendChild(tdUnit);
                tr.appendChild(tdRange);
                tr.appendChild(tdResult);
                tr.appendChild(tdRemarks);

                tbody.appendChild(tr);
            });
        }

        function setToday() {
            var today = new Date().toISOString().split('T')[0];
            document.getElementById('sampleDate').value = today;
        }

        /**
         * Save test entry:
         * - Updates test_order: sample_collected_at, status, notes, updated_at
         * - Updates test_order_component: result_value, flag, updated_at
         */
        function saveTestEntry() {
            var panelSelect = document.getElementById('panelSelect');
            var testOrderId = panelSelect.value;

            if (!testOrderId) {
                alert('Please select a test panel');
                return;
            }

            if (!currentPatientId) {
                alert('No patient selected');
                return;
            }

            // Collect component results from the table
            var components = [];
            var rows = document.querySelectorAll('#componentsTable tr');
            rows.forEach(function(row) {
                var resultInput = row.querySelector('input[data-component-id]');
                var flagSelect = row.querySelector('select[data-field="flag"]');
                if (resultInput && flagSelect) {
                    components.push({
                        id: parseInt(resultInput.getAttribute('data-component-id')),
                        resultValue: resultInput.value,
                        flag: flagSelect.value
                    });
                }
            });

            var payload = {
                testOrderId: testOrderId,
                sampleCollectedAt: document.getElementById('sampleDate').value,
                status: document.getElementById('reportStatus').value,
                notes: document.getElementById('notes').value,
                components: components
            };

            console.log('Saving test entry:', payload);

            fetch('/api/patients/' + currentPatientId + '/test-entry', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
                .then(function(response) { return response.json(); })
                .then(function(data) {
                    if (data.success) {
                        alert('Test entry saved successfully!');
                        // Reload test orders to reflect updated data
                        loadTestOrders(currentPatientId);
                    } else {
                        alert('Failed to save: ' + (data.error || 'Unknown error'));
                    }
                })
                .catch(function(error) {
                    console.error('Error saving test entry:', error);
                    alert('Error saving test entry. Please try again.');
                });
        }

        function printReport() {
            const patientId = document.getElementById('patientSelect')?.value;
            if (!patientId || patientId === 'Select patient') {
                alert('Please select a patient before printing the report.');
                return;
            }
            window.open(`/report/print.html?patientId=${encodeURIComponent(patientId)}`, '_blank');
        }

        function calculateAge(dob) {
            if (!dob) return '-';
            var birthDate = new Date(dob);
            var today = new Date();
            var age = today.getFullYear() - birthDate.getFullYear();
            var monthDiff = today.getMonth() - birthDate.getMonth();
            if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birthDate.getDate())) {
                age--;
            }
            return age;
        }
    </script>
</body>

</html>
