<!DOCTYPE html>
<html>
<head>
    <title>Print / PDF Report</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, Helvetica, sans-serif; margin: 0; padding: 0; }
        .toolbar { padding: 10px; background: #f5f5f5; border-bottom: 1px solid #ccc; }
        .toolbar button { padding: 6px 12px; margin-right: 8px; font-size: 13px; }
        .note { font-size: 12px; margin-top: 4px; color: #555; }
        iframe { width: 100%; height: calc(100vh - 60px); border: none; }
    </style>
</head>
<body>
    <div class="toolbar">
        <button onclick="doPrint()">Print / Save as PDF</button>
        <button onclick="reloadReport()">Reload Report</button>
    </div>

    <iframe id="reportFrame" src="/report-preview.html"></iframe>

    <script>
        const params = new URLSearchParams(window.location.search);
        const patientId = params.get('patientId');
        const reportFrame = document.getElementById('reportFrame');
        if (patientId) {
            reportFrame.src = '/report-preview.html?patientId=' + encodeURIComponent(patientId);
        }

        function doPrint() {
            try {
                reportFrame.contentWindow.focus();
                reportFrame.contentWindow.print();
            } catch (e) {
                window.print();
            }
        }

        function reloadReport() {
            reportFrame.src = '/report-preview.html' + (patientId ? '?patientId=' + encodeURIComponent(patientId) : '');
        }

        window.addEventListener('load', function () {
            setTimeout(doPrint, 200);
        });
    </script>
</body>
</html>
