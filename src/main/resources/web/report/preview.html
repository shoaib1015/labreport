<!DOCTYPE html>
<html>
<head>
    <title>Report Preview</title>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; }
        iframe { width: 100%; height: 100vh; border: none; }
    </style>
</head>
<body>
    <iframe id="reportFrame" src="/report-preview.html"></iframe>
    <script>
        const params = new URLSearchParams(window.location.search);
        const patientId = params.get('patientId');
        if (patientId) {
            document.getElementById('reportFrame').src = '/report-preview.html?patientId=' + encodeURIComponent(patientId);
        }
    </script>
<script src="/js/sort-selects.js"></script>
</body>
</html>
