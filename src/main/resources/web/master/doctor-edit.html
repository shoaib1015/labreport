<!DOCTYPE html>
<html>
<head>
    <title id="pageTitle">Add Doctor</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/styles.css">
    <style>
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"],
        input[type="email"],
        input[type="number"],
        input[type="tel"],
        select,
        textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }
        textarea {
            resize: vertical;
            min-height: 60px;
        }
        .button-group {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }
        button.save-btn {
            background-color: #2c5282;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button.save-btn:hover {
            background-color: #1e3f5a;
        }
        button.cancel-btn {
            background-color: white;
            color: #2c5282;
            padding: 10px 20px;
            border: 1px solid #2c5282;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button.cancel-btn:hover {
            background-color: #f0f0f0;
        }
        .error {
            color: #d9534f;
            padding: 10px;
            background-color: #f2dede;
            border: 1px solid #ebccd1;
            border-radius: 4px;
            margin-bottom: 15px;
            display: none;
        }
        .success {
            color: #3c763d;
            padding: 10px;
            background-color: #dff0d8;
            border: 1px solid #d6e9c6;
            border-radius: 4px;
            margin-bottom: 15px;
            display: none;
        }
    </style>
</head>
<body class="full-page">

<div class="page-content">
    <h2 id="pageHeading">Add Doctor</h2>
    <div class="subtitle">Add or modify doctor details</div>

    <div id="error" class="error"></div>
    <div id="success" class="success"></div>

    <form id="doctorForm">
        <div class="form-group">
            <label>Full Name *</label>
            <input type="text" name="full_name" id="fullName" required>
        </div>

        <div class="form-group">
            <label>Contact Number</label>
            <input type="tel" name="contact_number" id="contactNumber">
        </div>

        <div class="form-group">
            <label>License Number</label>
            <input type="text" name="license_number" id="licenseNumber">
        </div>

        <div class="form-group">
            <label>Commission Percent *</label>
            <input type="number" name="commission_percent" id="commissionPercent" min="0" step="0.01" placeholder="0.00" required>
        </div>

        <div class="form-group">
            <label>Status</label>
            <select name="status" id="status">
                <option value="Active">Active</option>
                <option value="Inactive">Inactive</option>
            </select>
        </div>

        <div class="button-group">
            <button type="button" class="save-btn" onclick="saveDoctor()">Save Doctor</button>
            <button type="button" class="cancel-btn" onclick="cancelForm()">Cancel</button>
        </div>
    </form>
</div>

<script>
    let currentDoctorId = null;

    document.addEventListener('DOMContentLoaded', function() {
        // Check if we're editing an existing doctor
        const params = new URLSearchParams(window.location.search);
        currentDoctorId = params.get('id');
        if (currentDoctorId) {
            document.getElementById('pageTitle').textContent = 'Edit Doctor';
            document.getElementById('pageHeading').textContent = 'Edit Doctor';
            loadDoctorData(currentDoctorId);
        }
    });

    function loadDoctorData(doctorId) {
        fetch(`/api/doctors/${doctorId}`, {
            method: 'GET',
            credentials: 'include',
            headers: {
                'Content-Type': 'application/json'
            }
        })
        .then(response => {
            if (!response.ok) {
                throw new Error('Failed to fetch doctor');
            }
            return response.json();
        })
        .then(doctor => {
            document.getElementById('fullName').value = doctor.full_name || '';
            document.getElementById('contactNumber').value = doctor.contact_number || '';
            document.getElementById('licenseNumber').value = doctor.license_number || '';
            document.getElementById('commissionPercent').value = doctor.commission_percent || '0';
            document.getElementById('status').value = doctor.status || 'Active';
        })
        .catch(error => {
            console.error('Error loading doctor:', error);
            showError('Error loading doctor data');
        });
    }

    function saveDoctor() {
        const fullName = document.getElementById('fullName').value.trim();
        const contactNumber = document.getElementById('contactNumber').value.trim();
        const licenseNumber = document.getElementById('licenseNumber').value.trim();
        const status = document.getElementById('status').value;
        const commissionPercent = document.getElementById('commissionPercent').value.trim();

        // Validation
        if (!fullName) {
            showError('Full Name is required');
            return;
        }

        // Prepare data as URL-encoded form data
        const params = new URLSearchParams();
        params.append('full_name', fullName);
        params.append('contact_number', contactNumber);
        params.append('license_number', licenseNumber);
        params.append('commission_percent', commissionPercent || '0');
        params.append('status', status);

        // Determine if we're adding or updating
        const isEdit = currentDoctorId !== null;
        const url = isEdit ? `/api/doctors/${currentDoctorId}` : '/api/doctors';
        const method = 'POST';
        const successMessage = isEdit ? 'Doctor updated successfully!' : 'Doctor added successfully!';

        // Send to API
        fetch(url, {
            method: method,
            credentials: 'include',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded'
            },
            body: params.toString()
        })
        .then(async response => {
            const responseText = await response.text();
            let responseBody = null;
            try {
                responseBody = responseText ? JSON.parse(responseText) : null;
            } catch (e) {
                // ignore parse errors and fallback to generic message
            }

            if (!response.ok) {
                const message = responseBody?.message || 'Failed to save doctor';
                throw new Error(message);
            }

            return responseBody;
        })
        .then(data => {
            showSuccess(successMessage);
            setTimeout(() => {
                cancelForm();
            }, 1500);
        })
        .catch(error => {
            console.error('Error saving doctor:', error);
            showError(error.message || 'Error saving doctor. Please try again.');
        });
    }

    function cancelForm() {
        // Go back to doctor list
        window.parent.loadPage('/master/doctor.html');
    }

    function showError(message) {
        const errorDiv = document.getElementById('error');
        errorDiv.textContent = message;
        errorDiv.style.display = 'block';
        document.getElementById('success').style.display = 'none';
    }

    function showSuccess(message) {
        const successDiv = document.getElementById('success');
        successDiv.textContent = message;
        successDiv.style.display = 'block';
        document.getElementById('error').style.display = 'none';
    }

    function loadPage(page) {
        window.parent.loadPage(page);
    }
</script>

<script src="/js/sort-selects.js"></script>
</body>
</html>
