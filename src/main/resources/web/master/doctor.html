<!DOCTYPE html>
<html>
<head>
    <title>Doctor / Referral Master</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/styles.css">
    <style>
        .button-group {
            margin-bottom: 20px;
        }
        button.add-btn {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button.add-btn:hover {
            background-color: #45a049;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        table th, table td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }
        table th {
            background-color: #f2f2f2;
            font-weight: bold;
        }
        table tr:hover {
            background-color: #f9f9f9;
        }
        .loading {
            text-align: center;
            color: #666;
            margin: 20px 0;
        }
        .error {
            color: #d9534f;
            padding: 10px;
            background-color: #f2dede;
            border: 1px solid #ebccd1;
            border-radius: 4px;
            margin: 10px 0;
        }
        button.action-btn {
            padding: 5px 10px;
            margin: 0 2px;
            font-size: 12px;
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .status-bullet {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }
        .status-active {
            background-color: #28a745;
        }
        .status-inactive {
            background-color: #dc3545;
        }
    </style>
</head>
<body class="full-page">

<div class="page-content">
    <h2>Doctor / Referral Master</h2>
    <div class="subtitle">Manage referral doctors</div>

    <div class="button-group">
        <button class="add-btn" onclick="openAddDoctorForm()">Add New Doctor</button>
    </div>

    <div id="loading" class="loading">Loading doctors...</div>
    <div id="error" class="error" style="display: none;"></div>

    <table id="doctorsTable" style="display: none;">
        <thead>
            <tr>
                <th>Name</th>
                <th>Contact</th>
                <th>License Number</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="doctorsBody">
        </tbody>
    </table>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        loadDoctors();
    });

    function loadDoctors() {
        fetch('/api/doctors', {
            method: 'GET',
            credentials: 'include',
            headers: {
                'Content-Type': 'application/json'
            }
        })
        .then(response => {
            if (!response.ok) {
                throw new Error('Failed to fetch doctors');
            }
            return response.json();
        })
        .then(data => {
            displayDoctors(data);
            document.getElementById('loading').style.display = 'none';
            document.getElementById('doctorsTable').style.display = 'table';
        })
        .catch(error => {
            console.error('Error loading doctors:', error);
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
            document.getElementById('error').textContent = 'Error loading doctors. Please refresh the page.';
        });
    }

    function displayDoctors(doctors) {
        const tbody = document.getElementById('doctorsBody');
        tbody.innerHTML = '';
        
        doctors.forEach(doctor => {
            const statusClass = doctor.status === 'Active' ? 'status-active' : 'status-inactive';
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${escapeHtml(doctor.full_name)}</td>
                <td>${escapeHtml(doctor.contact_number)}</td>
                <td>${escapeHtml(doctor.license_number)}</td>
                <td>
                    <span class="status-badge">
                        <span class="status-bullet ${statusClass}"></span>
                        ${escapeHtml(doctor.status)}
                    </span>
                </td>
                <td>
                    <button class="action-btn" onclick="editDoctor(${doctor.id})">Edit</button>
                    <button class="action-btn" onclick="deleteDoctor(${doctor.id})">Delete</button>
                </td>
            `;
            tbody.appendChild(row);
        });
    }

    function openAddDoctorForm() {
        window.parent.loadPage('/master/doctor-edit.html');
    }

    function editDoctor(doctorId) {
        window.parent.loadPage(`/master/doctor-edit.html?id=${doctorId}`);
    }

    function deleteDoctor(doctorId) {
        if (confirm('Are you sure you want to delete this doctor?')) {
            fetch(`/api/doctors/${doctorId}`, {
                method: 'DELETE',
                credentials: 'include'
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('Failed to delete doctor');
                }
                return response.json();
            })
            .then(data => {
                console.log('Doctor deleted successfully');
                loadDoctors();
            })
            .catch(error => {
                console.error('Error deleting doctor:', error);
                alert('Error deleting doctor');
            });
        }
    }

    function escapeHtml(text) {
        if (!text) return '';
        const map = {
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#039;'
        };
        return text.replace(/[&<>"']/g, m => map[m]);
    }

    function loadPage(page) {
        window.parent.loadPage(page);
    }
</script>

</body>
</html>
