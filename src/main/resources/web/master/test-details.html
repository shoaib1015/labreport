<!DOCTYPE html>
<html>
<head>
    <title id="pageTitle">Test Details View</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/styles.css">
    <style>
        .details-container {
            max-width: 800px;
            margin: 20px auto;
        }
        .details-header {
            background-color: #2c5aa0;
            color: white;
            padding: 20px;
            border-radius: 4px 4px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .details-header h2 {
            margin: 0;
            font-size: 24px;
        }
        .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            padding: 0;
            width: 40px;
            height: 40px;
        }
        .details-body {
            background-color: #f9f9f9;
            padding: 20px;
            border: 1px solid #ddd;
        }
        .detail-row {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        .detail-row:last-child {
            border-bottom: none;
        }
        .detail-label {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        .detail-value {
            color: #666;
            font-size: 15px;
        }
        .badge {
            display: inline-block;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
        }
        .badge-primary {
            background-color: #e3f2fd;
            color: #1976d2;
        }
        .badge-category {
            background-color: #f3e5f5;
            color: #7b1fa2;
            font-weight: normal;
            padding: 4px 8px;
            font-size: 12px;
        }
        .status-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: 0.4s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.4s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #4CAF50;
        }
        input:checked + .slider:before {
            transform: translateX(26px);
        }
        .component-header {
            font-weight: bold;
            margin-top: 20px;
            margin-bottom: 15px;
            font-size: 16px;
            color: #333;
        }
        .component-list {
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .component-item {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .component-item:last-child {
            border-bottom: none;
        }
        .component-name {
            font-weight: 500;
            color: #333;
        }
        .component-details {
            color: #666;
            font-size: 13px;
            margin-top: 3px;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            flex: 1;
            text-align: center;
        }
        .btn-primary {
            background-color: #2c5aa0;
            color: white;
        }
        .btn-primary:hover {
            background-color: #1e3f5a;
        }
        .btn-danger {
            background-color: #dc3545;
            color: white;
        }
        .btn-danger:hover {
            background-color: #c82333;
        }
        .btn-secondary {
            background-color: #6c757d;
            color: white;
        }
        .btn-secondary:hover {
            background-color: #5a6268;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }
        .error-msg {
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body class="full-page">

<div class="page-content">
    <div class="details-container">
        <div class="details-header">
            <h2 id="panelNameTitle">Test Details View</h2>
            <button class="close-btn" onclick="goBackToList()">×</button>
        </div>
        <div class="details-body">
            <div id="errorMsg" class="error-msg" style="display: none;"></div>
            
            <div id="detailsLoading" class="loading" style="display: none;">
                Loading test details...
            </div>

            <div id="detailsContent">
                <div class="detail-row">
                    <div class="detail-label">Code: <span id="panelCode"></span></div>
                </div>

                <div class="detail-row">
                    <div class="detail-label">Category: <span id="panelCategory"></span></div>
                </div>

                <div class="detail-row">
                    <div class="detail-label">Part of: <span id="partOf" class="badge badge-primary"></span></div>
                </div>

                <div class="detail-row">
                    <div>
                        <div class="detail-label">Unit: <span id="panelUnit"></span></div>
                    </div>
                    <div style="margin-top: 10px;">
                        <div class="detail-label">Normal Range : <span id="panelNormalRange"></span></div>
                    </div>
                </div>

                <div class="detail-row">
                    <div class="detail-label">Price: <span id="panelPrice"></span></div>
                </div>

                <div class="detail-row">
                    <div class="detail-label">Status:</div>
                    <div class="status-toggle" style="margin-top: 8px;">
                        <label class="toggle-switch">
                            <input type="checkbox" id="statusToggle" onchange="toggleStatus()">
                            <span class="slider"></span>
                        </label>
                        <span id="statusText" style="font-weight: bold; color: #4CAF50;">Active</span>
                    </div>
                </div>

                <div class="component-header">Test Components:</div>
                <div class="component-list" id="componentList">
                    <div class="loading">Loading components...</div>
                </div>
            </div>

            <div class="button-group">
                <button class="btn btn-secondary" onclick="goBackToList()">Back to List</button>
            </div>
        </div>
    </div>
</div>

<script>
    let currentPanelData = null;
    let panelNameParam = null;

    document.addEventListener('DOMContentLoaded', function() {
        const params = new URLSearchParams(window.location.search);
        panelNameParam = params.get('panel_name');
        
        if (panelNameParam) {
            document.getElementById('panelNameTitle').textContent = panelNameParam;
            loadPanelDetails();
        } else {
            showError('Panel name is required');
        }
    });

    function loadPanelDetails() {
        document.getElementById('detailsLoading').style.display = 'block';
        document.getElementById('detailsContent').style.display = 'none';
        // Fetch panel details
        fetch(`/api/panels/name/${encodeURIComponent(panelNameParam)}`, {
            method: 'GET',
            credentials: 'include',
            headers: {
                'Content-Type': 'application/json'
            }
        })
        .then(response => {
            if (!response.ok) {
                throw new Error('Failed to fetch panel details');
            }
            return response.json();
        })
        .then(panel => {
            currentPanelData = panel;
            console.log('Panel details loaded:', panel);
            displayPanelDetails(panel);
            loadComponents();  // No parameter needed - uses currentPanelData.id
            document.getElementById('detailsLoading').style.display = 'none';
            document.getElementById('detailsContent').style.display = 'block';
        })
        .catch(error => {
            console.error('Error loading panel details:', error);
            showError('Error loading panel details. ' + error.message);
            document.getElementById('detailsLoading').style.display = 'none';
        });
    }

    function displayPanelDetails(panel) {
        document.getElementById('panelCode').textContent = panel.panel_code || 'N/A';
        document.getElementById('panelCategory').textContent = panel.category_name || 'N/A';
        document.getElementById('partOf').textContent = panel.panel_name || 'N/A';
        document.getElementById('panelUnit').textContent = panel.unit || 'N/A';
        document.getElementById('panelNormalRange').textContent = panel.normal_range || 'N/A';
        document.getElementById('panelPrice').textContent = '$' + (panel.price || '0');
        
        const isActive = panel.status === 'Active';
        document.getElementById('statusToggle').checked = isActive;
        document.getElementById('statusText').textContent = isActive ? 'Active' : 'Inactive';
        document.getElementById('statusText').style.color = isActive ? '#4CAF50' : '#dc3545';
    }

    function loadComponents() {
        console.log('Loading components for panel ID:', currentPanelData.id);
        
        if (!currentPanelData || !currentPanelData.id) {
            console.error('Panel ID is missing');
            const componentList = document.getElementById('componentList');
            componentList.innerHTML = '<div class="component-item"><span>Panel ID not available</span></div>';
            return;
        }
        
        const panelId = currentPanelData.id || currentPanelData.panel_id;
        console.log('Fetching from URL:', `/api/components/panel/${panelId}`);
        const url = `/api/components/panel/${panelId}`;
        console.log('Final URL:', url);
        
        fetch(url, {
            method: 'GET',
            credentials: 'include',
            headers: {
                'Content-Type': 'application/json'
            }
        })
        .then(response => {
            // Read response as text first to debug
            return response.text().then(text => {
                console.log('Raw response text:', text);
                return { status: response.status, ok: response.ok, text: text };
            });
        })
        .then(result => {
            if (!result.ok) {
                throw new Error(`HTTP Error: ${result.status} - ${result.text}`);
            }
            try {
                const components = JSON.parse(result.text);
                if (Array.isArray(components)) {
                    displayComponents(components);
                } else {
                    displayComponents([]);
                }
            } catch (parseError) {
                console.error('JSON Parse error:', parseError, 'Text was:', result.text);
                throw new Error(`Invalid JSON response: ${parseError.message}`);
            }
        })
        .catch(error => {
            console.error('Error loading components:', error);
            const componentList = document.getElementById('componentList');
            componentList.innerHTML = '<div class="component-item"><span>Error: ' + error.message + '</span></div>';
        });
    }

    function displayComponents(components) {
        const componentList = document.getElementById('componentList');
        
        if (!components || !Array.isArray(components) || components.length === 0) {
            console.log('No components to display');
            componentList.innerHTML = '<div class="component-item"><span>No components found</span></div>';
            return;
        }

        console.log('Displaying', components.length, 'components');
        componentList.innerHTML = '';
        
        components.forEach((component, index) => {
            console.log('Processing component:', index, component);
            const componentItem = document.createElement('div');
            componentItem.className = 'component-item';
            
            const componentName = component.component_name || 'N/A';
            const unit = component.unit || 'N/A';
            const normalRange = component.normal_range || 'N/A';
            
            const componentInfo = document.createElement('div');
            componentInfo.innerHTML = `
                <div>
                    <div class="component-name">${componentName} - ${unit}</div>
                    <div class="component-details">Normal: ${normalRange}</div>
                </div>
            `;
            
            componentItem.appendChild(componentInfo);
            componentList.appendChild(componentItem);
        });
    }

    function toggleStatus() {
        const isActive = document.getElementById('statusToggle').checked;
        document.getElementById('statusText').textContent = isActive ? 'Active' : 'Inactive';
        document.getElementById('statusText').style.color = isActive ? '#4CAF50' : '#dc3545';
    }

    function editPanel() {
        if (currentPanelData && currentPanelData.id) {
            window.parent.loadPage(`/master/test-edit.html?id=${currentPanelData.id}`);
        }
    }

    function deletePanel() {
        if (!currentPanelData || !currentPanelData.id) {
            showError('Cannot delete panel');
            return;
        }

        if (confirm('Are you sure you want to delete this panel?')) {
            fetch(`/api/panels/${currentPanelData.id}`, {
                method: 'DELETE',
                credentials: 'include',
                headers: {
                    'Content-Type': 'application/json'
                }
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('Failed to delete panel');
                }
                alert('Panel deleted successfully!');
                goBackToList();
            })
            .catch(error => {
                console.error('Error deleting panel:', error);
                showError('Error deleting panel. ' + error.message);
            });
        }
    }

    function goBackToList() {
        window.parent.loadPage('/master/test-list.html');
    }

    function showError(message) {
        const errorDiv = document.getElementById('errorMsg');
        errorDiv.textContent = message;
        errorDiv.style.display = 'block';
    }
</script>

</body>
</html>
