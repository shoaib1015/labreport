<!DOCTYPE html>
<html>
<head>
    <title>Add New Subtest</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/styles.css">
    <style>
        .dialog-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(128, 128, 128, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .dialog {
            background-color: white;
            border-radius: 8px;
            padding: 30px;
            max-width: 900px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }

        .dialog-header {
            background-color: #2c5282;
            color: white;
            padding: 15px 30px;
            margin: -30px -30px 20px -30px;
            border-radius: 8px 8px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dialog-header h2 {
            margin: 0;
            font-size: 20px;
        }

        .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            padding: 0;
            line-height: 1;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full {
            grid-column: 1 / -1;
        }

        label {
            font-weight: bold;
            margin-bottom: 8px;
            color: #333;
            font-size: 14px;
        }

        input[type="text"],
        input[type="number"],
        select,
        textarea {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            font-family: Arial, sans-serif;
            background-color: #fff;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #2c5282;
            background-color: #f9f9f9;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .required::after {
            content: " *";
            color: red;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }

        .btn-save {
            background-color: #2c5282;
            color: white;
        }

        .btn-save:hover {
            background-color: #1e3f5a;
        }

        .btn-cancel {
            background-color: white;
            color: #2c5282;
            border: 1px solid #2c5282;
        }

        .btn-cancel:hover {
            background-color: #f0f0f0;
        }

        .error-message {
            color: #d9534f;
            background-color: #f2dede;
            border: 1px solid #ebccd1;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
            display: none;
        }

        .success-message {
            color: #3c763d;
            background-color: #dff0d8;
            border: 1px solid #d6e9c6;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
            display: none;
        }
    </style>
</head>
<body>
<div class="dialog-overlay" id="dialogOverlay">
    <div class="dialog">
        <div class="dialog-header">
            <h2>Add New Subtest</h2>
            <button class="close-btn" onclick="closeDialog()">&times;</button>
        </div>

        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <form id="componentForm">
            <div class="form-grid">
                <div class="form-group">
                    <label for="panelName" class="required">Test Name</label>
                    <select name="panel_name" id="panelName" required onchange="updatePanelId()">
                        <option value="">Select Test</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="ageRange">Age Range</label>
                    <input type="text" name="age_range" id="ageRange" placeholder="e.g. 18-50 (optional)">
                </div>

                <div class="form-group">
                    <label for="componentName" class="required">Subtest Name</label>
                    <input type="text" name="component_name" id="componentName" placeholder="Enter subtest name" required>
                </div>

                <div class="form-group">
                    <label for="gender">Gender</label>
                    <select name="gender" id="gender">
                        <option value="">Select Gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="unit">Unit</label>
                    <input type="text" name="unit" id="unit" placeholder="Enter unit (optional)">
                </div>

                <div class="form-group">
                    <label for="status">Status</label>
                    <select name="status" id="status">
                        <option value="Active">Active</option>
                        <option value="Inactive">Inactive</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="normalRange">Normal Range</label>
                    <input type="text" name="normal_range" id="normalRange" placeholder="Enter normal range (optional)">
                </div>

                <div class="form-group full">
                    <label for="remarks">Remarks</label>
                    <textarea name="remarks" id="remarks" placeholder="Enter remarks (optional)"></textarea>
                </div>
            </div>

            <div class="button-group">
                <button type="button" class="btn-cancel" onclick="closeDialog()">Cancel</button>
                <button type="button" class="btn-save" onclick="saveComponent()">Save</button>
            </div>
        </form>
    </div>
</div>

<script>
    let panelsList = [];

    document.addEventListener('DOMContentLoaded', function() {
        loadPanels();
    });

    function loadPanels() {
        fetch('/api/panels', {
            method: 'GET',
            credentials: 'include',
            headers: {
                'Content-Type': 'application/json'
            }
        })
        .then(response => {
            if (!response.ok) {
                throw new Error('Failed to fetch panels');
            }
            return response.json();
        })
        .then(panels => {
            panelsList = panels;
            const panelNameSelect = document.getElementById('panelName');
            
            // Clear existing options except the default
            panelNameSelect.innerHTML = '<option value="">Select Test</option>';
            
            // Populate Panel Name dropdown
            panels.forEach(panel => {
                const option = document.createElement('option');
                option.value = panel.panel_name;
                option.textContent = panel.panel_name;
                panelNameSelect.appendChild(option);
            });

            // After panels are loaded, set panel name from URL parameter if provided
            const params = new URLSearchParams(window.location.search);
            const panelNameParam = params.get('panel_name');
            if (panelNameParam) {
                document.getElementById('panelName').value = decodeURIComponent(panelNameParam);
            }
        })
        .catch(error => {
            console.error('Error loading panels:', error);
            showError('Error loading panels');
        });
    }



    function saveComponent() {
        const panelName = document.getElementById('panelName').value.trim();
        const componentName = document.getElementById('componentName').value.trim();
        const ageRange = document.getElementById('ageRange').value.trim();
        const gender = document.getElementById('gender').value.trim();
        const unit = document.getElementById('unit').value.trim();
        const normalRange = document.getElementById('normalRange').value.trim();
        const remarks = document.getElementById('remarks').value.trim();
        const status = document.getElementById('status').value;

        // Validation
        if (!panelName) {
            showError('Panel Name is required');
            return;
        }

        if (!componentName) {
            showError('Component Name is required');
            return;
        }

        // Get panelId from panelsList based on panelName
        const selectedPanel = panelsList.find(p => p.panel_name === panelName);
        if (!selectedPanel) {
            showError('Invalid panel selected');
            return;
        }
        const panelId = selectedPanel.id;

        // Prepare form data
        const params = new URLSearchParams();
        params.append('panel_name', panelName);
        params.append('component_name', componentName);
        params.append('age_range', ageRange);
        params.append('gender', gender);
        params.append('unit', unit);
        params.append('normal_range', normalRange);
        params.append('remarks', remarks);
        params.append('status', status);
        params.append('panel_id', panelId);

        // Send to API
        fetch('/api/components', {
            method: 'POST',
            credentials: 'include',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded'
            },
            body: params.toString()
        })
        .then(response => {
            if (!response.ok) {
                throw new Error('Failed to save component');
            }
            return response.json();
        })
        .then(data => {
            showSuccess('Component added successfully!');
            setTimeout(() => {
                // Redirect back to test-list
                window.parent.loadPage('/master/test-list.html');
            }, 1500);
        })
        .catch(error => {
            console.error('Error saving component:', error);
            showError('Error saving component. Please try again.');
        });
    }

    function closeDialog() {
        // Go back to test-list
        window.parent.loadPage('/master/test-list.html');
    }

    function showError(message) {
        const errorDiv = document.getElementById('errorMessage');
        errorDiv.textContent = message;
        errorDiv.style.display = 'block';
        document.getElementById('successMessage').style.display = 'none';
    }

    function showSuccess(message) {
        const successDiv = document.getElementById('successMessage');
        successDiv.textContent = message;
        successDiv.style.display = 'block';
        document.getElementById('errorMessage').style.display = 'none';
    }
</script>

</body>
</html>
