<!DOCTYPE html>
<html>
<head>
    <title id="pageTitle">Add Panel</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/styles.css">
    <style>
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }
        textarea {
            resize: vertical;
            min-height: 60px;
        }
        .button-group {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }
        button.save-btn {
            background-color: #2c5282;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button.save-btn:hover {
            background-color: #1e3f5a;
        }
        button.cancel-btn {
            background-color: white;
            color: #2c5282;
            padding: 10px 20px;
            border: 1px solid #2c5282;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button.cancel-btn:hover {
            background-color: #f0f0f0;
        }
        .error {
            color: #d9534f;
            padding: 10px;
            background-color: #f2dede;
            border: 1px solid #ebccd1;
            border-radius: 4px;
            margin-bottom: 15px;
            display: none;
        }
        .success {
            color: #3c763d;
            padding: 10px;
            background-color: #dff0d8;
            border: 1px solid #d6e9c6;
            border-radius: 4px;
            margin-bottom: 15px;
            display: none;
        }
    </style>
</head>
<body class="full-page">

<div class="page-content">
    <h2 id="pageHeading">Add Test</h2>
    <div class="subtitle">Add or modify test details</div>

    <div id="error" class="error"></div>
    <div id="success" class="success"></div>

    <form id="panelForm">
        <div class="form-group">
            <label>Test Name *</label>
            <input type="text" name="panel_name" id="panelName" required>
            <div id="panelNameLink" style="margin-top: 8px; display: none;">
                <a href="#" id="panelDetailsLink" style="color: #007bff; text-decoration: none; font-size: 14px;" onclick="openTestDetails(event)">View Test Details</a>
            </div>
        </div>

        <div class="form-group">
            <label>Category *</label>
            <select name="category_id" id="categoryId" required>
                <option value="">Select Category</option>
            </select>
            <input type="hidden" id="categoryName" name="category_name">
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea name="description" id="description"></textarea>
        </div>

        <div class="form-group">
            <label>Price *</label>
            <input type="number" name="price" id="price" step="0.01" required>
        </div>

        <div class="form-group">
            <label>Status</label>
            <select name="status" id="status">
                <option value="Active">Active</option>
                <option value="Inactive">Inactive</option>
            </select>
        </div>

        <div class="button-group">
            <button type="button" class="save-btn" onclick="savePanel()">Save Test</button>
            <button type="button" class="edit-btn" onclick="addComponent()">Add New Subtest</button>
            <button type="button" class="cancel-btn" onclick="cancelForm()">Cancel</button>
        </div>
    </form>
</div>

<script>
    let currentPanelId = null;

    document.addEventListener('DOMContentLoaded', function() {
        loadCategories();
        
        const params = new URLSearchParams(window.location.search);
        currentPanelId = params.get('id');
        if (currentPanelId) {
            document.getElementById('pageTitle').textContent = 'Edit Panel';
            document.getElementById('pageHeading').textContent = 'Edit Panel';
            loadPanelData(currentPanelId);
        }
    });

    function loadCategories() {
        fetch('/api/categories', {
            method: 'GET',
            credentials: 'include',
            headers: {
                'Content-Type': 'application/json'
            }
        })
        .then(response => {
            if (!response.ok) {
                throw new Error('Failed to fetch categories');
            }
            return response.json();
        })
        .then(categories => {
            const select = document.getElementById('categoryId');
            categories.forEach(category => {
                const option = document.createElement('option');
                option.value = category.id;
                option.textContent = category.category_name;
                select.appendChild(option);
            });
        })
        .catch(error => {
            console.error('Error loading categories:', error);
            showError('Error loading categories');
        });
    }

    function loadPanelData(panelId) {
        fetch(`/api/panels/${panelId}`, {
            method: 'GET',
            credentials: 'include',
            headers: {
                'Content-Type': 'application/json'
            }
        })
        .then(response => {
            if (!response.ok) {
                throw new Error('Failed to fetch panel');
            }
            return response.json();
        })
        .then(panel => {
            document.getElementById('panelName').value = panel.panel_name || '';
            document.getElementById('categoryId').value = panel.category_id || '';
            document.getElementById('description').value = panel.description || '';
            document.getElementById('price').value = panel.price || '';
            document.getElementById('status').value = panel.status || 'Active';
            document.getElementById('categoryName').value = panel.category_name || '';
            // Show the test details link when editing
            document.getElementById('panelNameLink').style.display = 'block';
        })
        .catch(error => {
            console.error('Error loading panel:', error);
            showError('Error loading panel data');
        });
    }

    function savePanel() {
        const panelName = document.getElementById('panelName').value.trim();
        const categoryId = document.getElementById('categoryId').value;
        const description = document.getElementById('description').value.trim();
        const price = document.getElementById('price').value.trim();
        const status = document.getElementById('status').value;
        console.log('Saving panel with data:', {
            panelName,
            categoryId,
            description,
            price,
            status
        });
        // Validation
        if (!panelName) {
            showError('Panel Name is required');
            return;
        }

        if (!categoryId) {
            showError('Category is required');
            return;
        }

        if (!price) {
            showError('Price is required');
            return;
        }

        // Get the category name from the dropdown
        const categorySelect = document.getElementById('categoryId');
        const categoryName = categorySelect.options[categorySelect.selectedIndex].textContent;

        // Prepare data as URL-encoded form data
        const params = new URLSearchParams();
        params.append('panel_name', panelName);
        params.append('category_id', categoryId);
        params.append('category_name', categoryName);
        params.append('description', description);
        params.append('price', price);
        params.append('status', status);

        // Determine if we're adding or updating
        const isEdit = currentPanelId !== null;
        const url = isEdit ? `/api/panels/${currentPanelId}` : '/api/panels';
        const method = isEdit ? 'POST' : 'POST';
        const successMessage = isEdit ? 'Panel updated successfully!' : 'Panel added successfully!';

        // Send to API
        fetch(url, {
            method: method,
            credentials: 'include',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded'
            },
            body: params.toString()
        })
        .then(response => {
            if (!response.ok) {
                throw new Error('Failed to save panel');
            }
            return response.json();
        })
        .then(data => {
            showSuccess(successMessage);
            setTimeout(() => {
                cancelForm();
            }, 1500);
        })
        .catch(error => {
            console.error('Error saving panel:', error);
            showError('Error saving panel. Please try again.');
        });
    }

    function cancelForm() {
        // Go back to panel list
        window.parent.loadPage('/master/test-list.html');
    }

    function addComponent() {
        const panelName = document.getElementById('panelName').value.trim();
        console.log('Adding component to panel:', panelName);
        if (panelName) {
            window.parent.loadPage(`/master/new-component.html?panel_name=${encodeURIComponent(panelName)}`);
        } else {
            showError('Please enter or load a panel name first');
        }
    }

    function showError(message) {
        const errorDiv = document.getElementById('error');
        errorDiv.textContent = message;
        errorDiv.style.display = 'block';
        document.getElementById('success').style.display = 'none';
    }

    function showSuccess(message) {
        const successDiv = document.getElementById('success');
        successDiv.textContent = message;
        successDiv.style.display = 'block';
        document.getElementById('error').style.display = 'none';
    }

    function loadPage(page) {
        window.parent.loadPage(page);
    }

    function openTestDetails(event) {
        event.preventDefault();
        const panelName = document.getElementById('panelName').value.trim();
        if (panelName) {
            window.parent.loadPage(`/master/test-details.html?panel_name=${encodeURIComponent(panelName)}`);
        } else {
            showError('Please enter or load a panel name first');
        }
    }
</script>

</body>
</html>

</body>
</html>
