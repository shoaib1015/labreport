<!DOCTYPE html>
<html>
<head>
    <title id="pageTitle">Add Test</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/styles.css">
    <style>
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }
        textarea {
            resize: vertical;
            min-height: 60px;
        }
        .button-group {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }
        button.save-btn {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button.save-btn:hover {
            background-color: #45a049;
        }
        button.cancel-btn {
            background-color: #f44336;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button.cancel-btn:hover {
            background-color: #da190b;
        }
        .error {
            color: #d9534f;
            padding: 10px;
            background-color: #f2dede;
            border: 1px solid #ebccd1;
            border-radius: 4px;
            margin-bottom: 15px;
            display: none;
        }
        .success {
            color: #3c763d;
            padding: 10px;
            background-color: #dff0d8;
            border: 1px solid #d6e9c6;
            border-radius: 4px;
            margin-bottom: 15px;
            display: none;
        }
    </style>
</head>
<body class="full-page">

<div class="page-content">
    <h2 id="pageHeading">Add Test</h2>
    <div class="subtitle">Add or modify test details</div>

    <div id="error" class="error"></div>
    <div id="success" class="success"></div>

    <form id="testForm">
        <div class="form-group">
            <label>Test Name *</label>
            <input type="text" name="test_name" id="testName" required>
        </div>

        <div class="form-group">
            <label>Unit</label>
            <input type="text" name="unit" id="unit">
        </div>

        <div class="form-group">
            <label>Normal Range</label>
            <textarea name="normal_range" id="normalRange"></textarea>
        </div>

        <div class="form-group">
            <label>Category</label>
            <select name="category" id="category">
                <option value="">Select Category</option>
                <option value="Hematology">Hematology</option>
                <option value="Biochemistry">Biochemistry</option>
                <option value="Immunology">Immunology</option>
                <option value="Microbiology">Microbiology</option>
                <option value="Chemistry">Chemistry</option>
            </select>
        </div>

        <div class="form-group">
            <label>Price *</label>
            <input type="number" name="price" id="price" step="0.01" required>
        </div>

        <div class="button-group">
            <button type="button" class="save-btn" onclick="saveTest()">Save Test</button>
            <button type="button" class="cancel-btn" onclick="cancelForm()">Cancel</button>
        </div>
    </form>
</div>

<script>
    let currentTestId = null;

    document.addEventListener('DOMContentLoaded', function() {
        // Check if we're editing an existing test (pass test ID if needed)
        const params = new URLSearchParams(window.location.search);
        currentTestId = params.get('id');
        if (currentTestId) {
            document.getElementById('pageTitle').textContent = 'Edit Test';
            document.getElementById('pageHeading').textContent = 'Edit Test';
            loadTestData(currentTestId);
        }
    });

    function loadTestData(testId) {
        fetch(`/api/tests/${testId}`, {
            method: 'GET',
            credentials: 'include',
            headers: {
                'Content-Type': 'application/json'
            }
        })
        .then(response => {
            if (!response.ok) {
                throw new Error('Failed to fetch test');
            }
            return response.json();
        })
        .then(test => {
            document.getElementById('testName').value = test.test_name || '';
            document.getElementById('unit').value = test.unit || '';
            document.getElementById('normalRange').value = test.normal_range || '';
            document.getElementById('category').value = test.category || '';
            document.getElementById('price').value = test.price || '';
        })
        .catch(error => {
            console.error('Error loading test:', error);
            showError('Error loading test data');
        });
    }

    function saveTest() {
        const testName = document.getElementById('testName').value.trim();
        const unit = document.getElementById('unit').value.trim();
        const normalRange = document.getElementById('normalRange').value.trim();
        const category = document.getElementById('category').value;
        const price = document.getElementById('price').value.trim();

        // Validation
        if (!testName) {
            showError('Test Name is required');
            return;
        }

        if (!price) {
            showError('Price is required');
            return;
        }

        // Prepare data as URL-encoded form data
        const params = new URLSearchParams();
        params.append('test_name', testName);
        params.append('unit', unit);
        params.append('normal_range', normalRange);
        params.append('category', category);
        params.append('price', price);

        // Determine if we're adding or updating
        const isEdit = currentTestId !== null;
        const url = isEdit ? `/api/tests/${currentTestId}` : '/api/tests';
        const method = isEdit ? 'POST' : 'POST';
        const successMessage = isEdit ? 'Test updated successfully!' : 'Test added successfully!';

        // Send to API
        fetch(url, {
            method: method,
            credentials: 'include',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded'
            },
            body: params.toString()
        })
        .then(response => {
            if (!response.ok) {
                throw new Error('Failed to save test');
            }
            return response.json();
        })
        .then(data => {
            showSuccess(successMessage);
            setTimeout(() => {
                cancelForm();
            }, 1500);
        })
        .catch(error => {
            console.error('Error saving test:', error);
            showError('Error saving test. Please try again.');
        });
    }

    function cancelForm() {
        // Go back to test list
        window.parent.loadPage('/master/test-list.html');
    }

    function showError(message) {
        const errorDiv = document.getElementById('error');
        errorDiv.textContent = message;
        errorDiv.style.display = 'block';
        document.getElementById('success').style.display = 'none';
    }

    function showSuccess(message) {
        const successDiv = document.getElementById('success');
        successDiv.textContent = message;
        successDiv.style.display = 'block';
        document.getElementById('error').style.display = 'none';
    }

    function loadPage(page) {
        window.parent.loadPage(page);
    }
</script>

</body>
</html>
