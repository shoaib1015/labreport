<!DOCTYPE html>
<html>
<head>
    <title>Panel Master</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/styles.css">
    <style>
        .button-group {
            margin-bottom: 20px;
        }
        button.add-btn {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-right: 10px;
        }
        button.add-btn:hover {
            background-color: #45a049;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        table th, table td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }
        table th {
            background-color: #2c5282;
            font-weight: bold;
        }
        table tr:hover {
            background-color: #f9f9f9;
        }
        .loading {
            text-align: center;
            color: #666;
            margin: 20px 0;
        }
        .error {
            color: #d9534f;
            padding: 10px;
            background-color: #f2dede;
            border: 1px solid #ebccd1;
            border-radius: 4px;
            margin: 10px 0;
        }
        button.action-btn {
            padding: 5px 10px;
            margin: 0 2px;
            font-size: 12px;
        }
    </style>
</head>
<body class="full-page">

<div class="page-content">
    <h2>Panel Master</h2>
    <div class="subtitle">Manage laboratory test panels and categories</div>

    <div class="button-group">
        <button class="add-btn" onclick="openAddPanelForm()">Add New Panel</button>
        <button class="add-btn" onclick="openAddCategoryForm()" style="background-color: #2196F3;">Add New Category</button>
    </div>

    <div id="loading" class="loading">Loading panels...</div>
    <div id="error" class="error" style="display: none;"></div>

    <table id="panelsTable" style="display: none;">
        <thead>
            <tr>
                <th>Panel Name</th>
                <th>Category</th>
                <th>Description</th>
                <th>Price</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="panelsBody">
        </tbody>
    </table>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        loadPanels();
    });

    function loadPanels() {
        fetch('/api/panels', {
            method: 'GET',
            credentials: 'include',
            headers: {
                'Content-Type': 'application/json'
            }
        })
        .then(response => {
            if (!response.ok) {
                throw new Error('Failed to fetch panels');
            }
            return response.json();
        })
        .then(data => {
            displayPanels(data);
            document.getElementById('loading').style.display = 'none';
            document.getElementById('panelsTable').style.display = 'table';
        })
        .catch(error => {
            console.error('Error loading panels:', error);
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
            document.getElementById('error').textContent = 'Error loading panels. Please refresh the page.';
        });
    }

    function displayPanels(panels) {
        const tbody = document.getElementById('panelsBody');
        tbody.innerHTML = '';
        
        panels.forEach(panel => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><a href="#" onclick="viewPanelDetails('${escapeHtml(panel.panel_name)}'); return false;" 
                style="color:#007bff; text-decoration:none; font-weight:bold;">
                ${escapeHtml(panel.panel_name)}
                </a></td>
                <td>${escapeHtml(panel.category_name || 'N/A')}</td>
                <td>${escapeHtml(panel.description || '')}</td>
                <td>${escapeHtml(panel.price || '')}</td>
                <td>${escapeHtml(panel.status || 'Active')}</td>
                <td>
                    <button class="action-btn" onclick="editPanel(${panel.id})">Edit</button>
                    <button class="action-btn" onclick="deletePanel(${panel.id})">Delete</button>
                </td>
            `;
            tbody.appendChild(row);
        });
    }

    function openAddPanelForm() {
        window.parent.loadPage('/master/test-edit.html');
    }

    function openAddCategoryForm() {
        window.parent.loadPage('/master/category.html');
    }

    function viewPanelDetails(panelName) {
        console.log('Viewing details for panel:', panelName);
        window.parent.loadPage(`/master/test-details.html?panel_name=${encodeURIComponent(panelName)}`);
        return false;
    }

    function editPanel(panelId) {
        window.parent.loadPage(`/master/test-edit.html?id=${panelId}`);
    }

    function deletePanel(panelId) {
        if (confirm('Are you sure you want to delete this panel?')) {
            fetch(`/api/panels/${panelId}`, {
                method: 'DELETE',
                credentials: 'include'
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('Failed to delete panel');
                }
                return response.json();
            })
            .then(data => {
                console.log('Panel deleted successfully');
                loadPanels();
            })
            .catch(error => {
                console.error('Error deleting panel:', error);
                alert('Error deleting panel');
            });
        }
    }

    function escapeHtml(text) {
        if (!text) return '';
        const map = {
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#039;'
        };
        return text.replace(/[&<>"']/g, m => map[m]);
    }
</script>

</body>
</html>
