<!DOCTYPE html>
<html>
<head>
    <title>Test Master</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/styles.css">
    <style>
        .button-group {
            margin-bottom: 20px;
        }
        button.add-btn {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button.add-btn:hover {
            background-color: #45a049;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        table th, table td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }
        table th {
            background-color: #f2f2f2;
            font-weight: bold;
        }
        table tr:hover {
            background-color: #f9f9f9;
        }
        .loading {
            text-align: center;
            color: #666;
            margin: 20px 0;
        }
        .error {
            color: #d9534f;
            padding: 10px;
            background-color: #f2dede;
            border: 1px solid #ebccd1;
            border-radius: 4px;
            margin: 10px 0;
        }
        button.action-btn {
            padding: 5px 10px;
            margin: 0 2px;
            font-size: 12px;
        }
    </style>
</head>
<body class="full-page">

<div class="page-content">
    <h2>Test Master</h2>
    <div class="subtitle">Manage laboratory tests and categories</div>

    <div class="button-group">
        <button class="add-btn" onclick="openAddTestForm()">Add New Test</button>
    </div>

    <div id="loading" class="loading">Loading tests...</div>
    <div id="error" class="error" style="display: none;"></div>

    <table id="testsTable" style="display: none;">
        <thead>
            <tr>
                <th>Test Name</th>
                <th>Category</th>
                <th>Price</th>
                <th>Unit</th>
                <th>Normal Range</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="testsBody">
        </tbody>
    </table>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        loadTests();
    });

    function loadTests() {
        fetch('/api/tests', {
            method: 'GET',
            credentials: 'include',
            headers: {
                'Content-Type': 'application/json'
            }
        })
        .then(response => {
            if (!response.ok) {
                throw new Error('Failed to fetch tests');
            }
            return response.json();
        })
        .then(data => {
            displayTests(data);
            document.getElementById('loading').style.display = 'none';
            document.getElementById('testsTable').style.display = 'table';
        })
        .catch(error => {
            console.error('Error loading tests:', error);
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
            document.getElementById('error').textContent = 'Error loading tests. Please refresh the page.';
        });
    }

    function displayTests(tests) {
        const tbody = document.getElementById('testsBody');
        tbody.innerHTML = '';
        
        tests.forEach(test => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${escapeHtml(test.test_name)}</td>
                <td>${escapeHtml(test.category)}</td>
                <td>${escapeHtml(test.price)}</td>
                <td>${escapeHtml(test.unit)}</td>
                <td>${escapeHtml(test.normal_range)}</td>
                <td>
                    <button class="action-btn" onclick="editTest(${test.id})">Edit</button>
                    <button class="action-btn" onclick="deleteTest(${test.id})">Delete</button>
                </td>
            `;
            tbody.appendChild(row);
        });
    }

    function openAddTestForm() {
        window.parent.loadPage('/master/test-edit.html');
    }

    function editTest(testId) {
        window.parent.loadPage(`/master/test-edit.html?id=${testId}`);
    }

    function deleteTest(testId) {
        if (confirm('Are you sure you want to delete this test?')) {
            fetch(`/api/tests/${testId}`, {
                method: 'DELETE',
                credentials: 'include'
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('Failed to delete test');
                }
                return response.json();
            })
            .then(data => {
                console.log('Test deleted successfully');
                loadTests();
            })
            .catch(error => {
                console.error('Error deleting test:', error);
                alert('Error deleting test');
            });
        }
    }

    function escapeHtml(text) {
        if (!text) return '';
        const map = {
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#039;'
        };
        return text.replace(/[&<>"']/g, m => map[m]);
    }
</script>

</body>
</html>
