<!DOCTYPE html>
<html>
<head>
    <title>Test Catalog</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/styles.css">
    <style>
        .button-group {
            margin-bottom: 20px;
            display: flex;          /* ensures buttons sit side by side */
            gap: 8px;               /* small spacing between buttons */
        }

        button.add-btn {
            background-color: #2563eb;
            color: white;
            padding: 6px 12px;      /* smaller padding for compact size */
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;        /* smaller text */
            display: inline-block;
        }

        button.add-btn:hover {
            background-color: #1e3f5a;
        }

        .table-container {
            max-height: 600px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 4px;
            margin-top: 20px;
        }
        .table-container::-webkit-scrollbar {
            width: 8px;
        }
        .table-container::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }
        .table-container::-webkit-scrollbar-thumb {
            background: #2563eb;
            border-radius: 4px;
        }
        .table-container::-webkit-scrollbar-thumb:hover {
            background: #1e3f5a;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        table th, table td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }
        table th {
            background-color: #2563eb;
            font-weight: bold;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        table tr:hover {
            background-color: #f9f9f9;
        }
        .loading {
            text-align: center;
            color: #666;
            margin: 20px 0;
        }
        .error {
            color: #d9534f;
            padding: 10px;
            background-color: #f2dede;
            border: 1px solid #ebccd1;
            border-radius: 4px;
            margin: 10px 0;
        }
        button.action-btn {
            padding: 5px 10px;
            margin: 0 2px;
            font-size: 12px;
        }
        .search-container {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .search-container input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            max-width: 400px;
        }
        .search-container input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 5px rgba(37, 99, 235, 0.3);
        }
        .search-info {
            color: #666;
            font-size: 13px;
        }
    </style>
</head>
<body class="full-page">

<div class="page-content">
    <h2>Test Catalog</h2>
    <div class="subtitle">Manage laboratory tests and categories</div>

    <div class="button-group">
        <button class="add-btn" onclick="openAddPanelForm()">Add New Test</button>
        <button class="add-btn" onclick="openAddCategoryForm()" style="background-color: #2196F3;">Add New Category</button>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search tests by name, category, or description..." onkeyup="filterPanels()">
        <span class="search-info" id="searchInfo"></span>
    </div>

    <div id="loading" class="loading">Loading panels...</div>
    <div id="error" class="error" style="display: none;"></div>

    <div class="table-container">
        <table id="panelsTable" style="display: none;">
            <thead>
                <tr>
                    <th>Test Name</th>
                    <th>Category</th>
                    <th>Description</th>
                    <th>Price</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="panelsBody">
            </tbody>
        </table>
    </div>
</div>

<script>
    let allPanels = [];

    document.addEventListener('DOMContentLoaded', function() {
        loadPanels();
    });

    function loadPanels() {
        fetch('/api/panels', {
            method: 'GET',
            credentials: 'include',
            headers: {
                'Content-Type': 'application/json'
            }
        })
        .then(response => {
            if (!response.ok) {
                throw new Error('Failed to fetch panels');
            }
            return response.json();
        })
        .then(data => {
            allPanels = data;
            displayPanels(data);
            updateSearchInfo(data.length);
            document.getElementById('loading').style.display = 'none';
            document.getElementById('panelsTable').style.display = 'table';
        })
        .catch(error => {
            console.error('Error loading panels:', error);
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
            document.getElementById('error').textContent = 'Error loading panels. Please refresh the page.';
        });
    }

    function displayPanels(panels) {
        const tbody = document.getElementById('panelsBody');
        tbody.innerHTML = '';
        
        panels.forEach(panel => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><a href="#" onclick="viewPanelDetails('${escapeHtml(panel.panel_name)}'); return false;" 
                style="color:#007bff; text-decoration:none; font-weight:bold;">
                ${escapeHtml(panel.panel_name)}
                </a></td>
                <td>${escapeHtml(panel.category_name || 'N/A')}</td>
                <td>${escapeHtml(panel.description || '')}</td>
                <td>${escapeHtml(panel.price || '')}</td>
                <td>${escapeHtml(panel.status || 'Active')}</td>
                <td>
                    <button class="action-btn" onclick="editPanel(${panel.id})">Edit</button>
                    <button class="action-btn" onclick="deletePanel(${panel.id})">Delete</button>
                </td>
            `;
            tbody.appendChild(row);
        });
    }

    function openAddPanelForm() {
        window.parent.loadPage('/master/test-edit.html');
    }

    function openAddCategoryForm() {
        window.parent.loadPage('/master/category.html');
    }

    function viewPanelDetails(panelName) {
        console.log('Viewing details for panel:', panelName);
        window.parent.loadPage(`/master/test-details.html?panel_name=${encodeURIComponent(panelName)}`);
        return false;
    }

    function editPanel(panelId) {
        window.parent.loadPage(`/master/test-edit.html?id=${panelId}`);
    }

    function deletePanel(panelId) {
        if (confirm('Are you sure you want to delete this panel?')) {
            fetch(`/api/panels/${panelId}`, {
                method: 'DELETE',
                credentials: 'include'
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('Failed to delete panel');
                }
                return response.json();
            })
            .then(data => {
                console.log('Panel deleted successfully');
                loadPanels();
            })
            .catch(error => {
                console.error('Error deleting panel:', error);
                alert('Error deleting panel');
            });
        }
    }

    function escapeHtml(text) {
        if (!text) return '';
        const map = {
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#039;'
        };
        return text.replace(/[&<>"']/g, m => map[m]);
    }

    function filterPanels() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
        
        if (!searchTerm) {
            displayPanels(allPanels);
            updateSearchInfo(allPanels.length);
            return;
        }
        
        const filteredPanels = allPanels.filter(panel => {
            const panelName = (panel.panel_name || '').toLowerCase();
            const category = (panel.category_name || '').toLowerCase();
            const description = (panel.description || '').toLowerCase();
            const price = (panel.price || '').toLowerCase();
            
            return panelName.includes(searchTerm) || 
                   category.includes(searchTerm) || 
                   description.includes(searchTerm) ||
                   price.includes(searchTerm);
        });
        
        displayPanels(filteredPanels);
        updateSearchInfo(filteredPanels.length, allPanels.length);
    }

    function updateSearchInfo(displayedCount, totalCount) {
        const searchInfo = document.getElementById('searchInfo');
        const searchTerm = document.getElementById('searchInput').value.trim();
        
        if (searchTerm) {
            searchInfo.textContent = `Showing ${displayedCount} of ${totalCount} results`;
        } else {
            searchInfo.textContent = `Total: ${displayedCount} tests`;
        }
    }

</script>

</body>
</html>
