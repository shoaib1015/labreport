<!DOCTYPE html>
<html>
<head>
    <title>Test Catalog</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/styles.css">
    <style>
        .button-group {
            margin-bottom: 20px;
            display: flex;          /* ensures buttons sit side by side */
            gap: 8px;               /* small spacing between buttons */
        }

        button.add-btn {
            background-color: #2563eb;
            color: white;
            padding: 6px 12px;      /* smaller padding for compact size */
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;        /* smaller text */
            display: inline-block;
        }

        button.add-btn:hover {
            background-color: #1e3f5a;
        }

        .table-container {
            max-height: 600px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 4px;
            margin-top: 20px;
        }
        .table-container::-webkit-scrollbar {
            width: 8px;
        }
        .table-container::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }
        .table-container::-webkit-scrollbar-thumb {
            background: #2563eb;
            border-radius: 4px;
        }
        .table-container::-webkit-scrollbar-thumb:hover {
            background: #1e3f5a;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        table th, table td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }
        table th {
            background-color: #2563eb;
            font-weight: bold;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        table tr:hover {
            background-color: #f9f9f9;
        }
        .loading {
            text-align: center;
            color: #666;
            margin: 20px 0;
        }
        .error {
            color: #d9534f;
            padding: 10px;
            background-color: #f2dede;
            border: 1px solid #ebccd1;
            border-radius: 4px;
            margin: 10px 0;
        }
        button.action-btn {
            padding: 5px 10px;
            margin: 0 2px;
            font-size: 12px;
        }
        .search-container {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .search-container input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            max-width: 400px;
        }
        .search-container input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 5px rgba(37, 99, 235, 0.3);
        }
        .search-info {
            color: #666;
            font-size: 13px;
        }

        /* Loader Styles */
        .loader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.3);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .loader-overlay.active {
            display: flex;
        }

        .loader-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #2563eb;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loader-text {
            color: white;
            margin-top: 10px;
            font-size: 14px;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            max-width: 700px;
            width: 90%;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
        }
        .modal-header {
            background-color: #2563eb;
            color: white;
            padding: 15px 20px;
            border-radius: 8px 8px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header h3 {
            margin: 0;
            font-size: 18px;
        }
        .modal-close {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            line-height: 1;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-body {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
        }
        .modal-footer {
            padding: 15px 20px;
            border-top: 1px solid #ddd;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            background-color: #f9f9f9;
            border-radius: 0 0 8px 8px;
        }
        .modal-footer button {
            padding: 8px 16px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }
        .modal-footer .cancel-btn {
            background-color: #2563eb;
            width: fit-content;
            color: white;
        }
        .modal-footer .cancel-btn:hover {
            background-color: #1e3f5a;
        }
    </style>
</head>
<body class="full-page">

<div class="page-content">
    <h2>Test Catalog</h2>
    <div class="subtitle">Manage laboratory tests and categories</div>

    <div class="button-group">
        <button class="add-btn" onclick="openAddPanelForm()">Add New Test</button>
        <button class="add-btn" onclick="openAddCategoryForm()">Add New Category</button>
        <button class="add-btn" onclick="openViewCategoriesDialog()">View Categories</button>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search tests by name, category, or description..." onkeypress="handleSearchKeypress(event)">
        <span class="search-info" id="searchInfo"></span>
    </div>

    <!-- Loader Overlay -->
    <div id="loaderOverlay" class="loader-overlay">
        <div style="text-align: center;">
            <div class="loader-spinner"></div>
            <div class="loader-text">Processing data...</div>
        </div>
    </div>

    <div id="loading" class="loading">Loading panels...</div>
    <div id="error" class="error" style="display: none;"></div>

    <div class="table-container">
        <table id="panelsTable" style="display: none;">
            <thead>
                <tr>
                    <th>Test Name</th>
                    <th>Category</th>
                    <th>Description</th>
                    <th>Price</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="panelsBody">
            </tbody>
        </table>
    </div>

    <!-- Categories Modal -->
    <div id="categoriesModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Categories in Database</h3>
                <button class="modal-close" onclick="closeCategoriesModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="table-container" style="max-height: 400px;">
                    <table id="categoriesTable" style="width: 100%;">
                        <thead>
                            <tr>
                                <th>Category Name</th>
                                <th>Description</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="categoriesBody">
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="modal-footer">
                <button class="cancel-btn" onclick="closeCategoriesModal()">Close</button>
            </div>
        </div>
    </div>
</div>

<script>
    let allPanels = [];

    document.addEventListener('DOMContentLoaded', function() {
        loadPanels();
    });

    function loadPanels() {
        fetch('/api/panels', {
            method: 'GET',
            credentials: 'include',
            headers: {
                'Content-Type': 'application/json'
            }
        })
        .then(response => {
            if (!response.ok) {
                throw new Error('Failed to fetch panels');
            }
            return response.json();
        })
        .then(data => {
            allPanels = data;
            displayPanels(data);
            updateSearchInfo(data.length);
            document.getElementById('loading').style.display = 'none';
            document.getElementById('panelsTable').style.display = 'table';
        })
        .catch(error => {
            console.error('Error loading panels:', error);
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
            document.getElementById('error').textContent = 'Error loading panels. Please refresh the page.';
        });
    }

    function displayPanels(panels) {
        const tbody = document.getElementById('panelsBody');
        tbody.innerHTML = '';
        
        panels.forEach(panel => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><a href="#" onclick="viewPanelDetails('${escapeHtml(panel.panel_name)}'); return false;" 
                style="color:#007bff; text-decoration:none; font-weight:bold;">
                ${escapeHtml(panel.panel_name)}
                </a></td>
                <td>${escapeHtml(panel.category_name || 'N/A')}</td>
                <td>${escapeHtml(panel.description || '')}</td>
                <td>${escapeHtml(panel.price || '')}</td>
                <td>${escapeHtml(panel.status || 'Active')}</td>
                <td>
                    <button class="action-btn" onclick="editPanel(${panel.id})">Edit</button>
                    <button class="action-btn" onclick="deletePanel(${panel.id})">Delete</button>
                </td>
            `;
            tbody.appendChild(row);
        });
    }

    function openAddPanelForm() {
        window.parent.loadPage('/master/test-edit.html');
    }

    function openAddCategoryForm() {
        window.parent.loadPage('/master/category.html');
    }

    function viewPanelDetails(panelName) {
        console.log('Viewing details for panel:', panelName);
        window.parent.loadPage(`/master/test-details.html?panel_name=${encodeURIComponent(panelName)}`);
        return false;
    }

    function editPanel(panelId) {
        window.parent.loadPage(`/master/test-edit.html?id=${panelId}`);
    }

    function deletePanel(panelId) {
        if (confirm('Are you sure you want to delete this panel?')) {
            fetch(`/api/panels/${panelId}`, {
                method: 'DELETE',
                credentials: 'include'
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('Failed to delete panel');
                }
                return response.json();
            })
            .then(data => {
                console.log('Panel deleted successfully');
                loadPanels();
            })
            .catch(error => {
                console.error('Error deleting panel:', error);
                alert('Error deleting panel');
            });
        }
    }

    function escapeHtml(text) {
        if (!text) return '';
        const map = {
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#039;'
        };
        return text.replace(/[&<>"']/g, m => map[m]);
    }

    function handleSearchKeypress(event) {
        // Only trigger search when Enter key is pressed
        if (event.key === 'Enter') {
            filterPanels();
        }
    }

    function filterPanels() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
        const loaderOverlay = document.getElementById('loaderOverlay');
        
        // Show loader
        loaderOverlay.classList.add('active');
        
        // Simulate processing with setTimeout
        setTimeout(() => {
            if (!searchTerm) {
                displayPanels(allPanels);
                updateSearchInfo(allPanels.length);
            } else {
                const filteredPanels = allPanels.filter(panel => {
                    const panelName = (panel.panel_name || '').toLowerCase();
                    const category = (panel.category_name || '').toLowerCase();
                    const description = (panel.description || '').toLowerCase();
                    const price = (panel.price || '').toLowerCase();
                    
                    return panelName.includes(searchTerm) || 
                           category.includes(searchTerm) || 
                           description.includes(searchTerm) ||
                           price.includes(searchTerm);
                });
                
                displayPanels(filteredPanels);
                updateSearchInfo(filteredPanels.length, allPanels.length);
            }
            
            // Hide loader
            loaderOverlay.classList.remove('active');
        }, 300);
    }

    function updateSearchInfo(displayedCount, totalCount) {
        const searchInfo = document.getElementById('searchInfo');
        const searchTerm = document.getElementById('searchInput').value.trim();
        
        if (searchTerm) {
            searchInfo.textContent = `Showing ${displayedCount} of ${totalCount} results`;
        } else {
            searchInfo.textContent = `Total: ${displayedCount} tests`;
        }
    }

    function openViewCategoriesDialog() {
        loadCategories();
        document.getElementById('categoriesModal').style.display = 'flex';
    }

    function closeCategoriesModal() {
        document.getElementById('categoriesModal').style.display = 'none';
    }

    function loadCategories() {
        fetch('/api/categories', {
            method: 'GET',
            credentials: 'include',
            headers: {
                'Content-Type': 'application/json'
            }
        })
        .then(response => {
            if (!response.ok) {
                throw new Error('Failed to fetch categories');
            }
            return response.json();
        })
        .then(data => {
            displayCategories(data);
        })
        .catch(error => {
            console.error('Error loading categories:', error);
            alert('Error loading categories. Please try again.');
        });
    }

    function displayCategories(categories) {
        const tbody = document.getElementById('categoriesBody');
        tbody.innerHTML = '';
        
        categories.forEach(category => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${escapeHtml(category.category_name || '')}</td>
                <td>${escapeHtml(category.description || '')}</td>
                <td>${escapeHtml(category.status || 'Active')}</td>
            `;
            tbody.appendChild(row);
        });
    }

</script>

<script src="/js/sort-selects.js"></script>
</body>
</html>
