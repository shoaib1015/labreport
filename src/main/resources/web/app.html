<!DOCTYPE html>
<html>
<head>
    <title>Lab Report System</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/styles.css">
</head>
<body>

<!-- App Root -->
<div id="app-root" style="height:100vh; width:100%;">

    <!-- Dashboard Header (hidden until login) -->
    <div id="dashboard-header" class="navbar hidden">
        <div class="menu-item">
            ⚙️ Master
            <div class="dropdown">
                <div onclick="loadPage('/master/lab.html')">Lab Profile</div>
                <div onclick="loadPage('/master/test-list.html')">Tests</div>
                <div onclick="loadPage('/master/doctor.html')">Doctors</div>
            </div>
        </div>

        <div class="menu-item">
            👥 Patients
            <div class="dropdown">
                <div onclick="loadPage('/patient/patient-edit.html')">New Patient</div>
                <div onclick="loadPage('/patient/patient-list.html')">Search Patient</div>
            </div>
        </div>

        <div class="menu-item">
            📋 Reports
            <div class="dropdown">
                <div onclick="loadPage('/patient/patient-list.html')">Create Report</div>
                <div onclick="loadPage('/search.html')">Search Reports</div>
                <div onclick="loadPage('/report/print.html')">View & Print</div>
            </div>
        </div>

        <div class="menu-item">
            💰 Settlement
            <div class="dropdown">
                <div onclick="loadPage('/settlement.html')">Settlement & Billing</div>
            </div>
        </div>

        <div class="menu-item exit" onclick="logout()">🚪 Logout</div>
    </div>

    <!-- Main Iframe -->
        <iframe id="appFrame"
            src="/login.html"
            style="width:100%; height:100%; border:none; background:transparent;"
            allowTransparency="true">
        </iframe>
</div>

<script>
function loadPage(page) {
    document.getElementById("appFrame").src = page;
}

/* Called after successful login */
function showDashboard() {
    document.getElementById("dashboard-header").classList.remove("hidden");
    document.getElementById("appFrame").style.height = "calc(100vh - 50px)";
}

/* Logout function */
function logout() {
    if (confirm('Are you sure you want to logout?')) {
        document.getElementById("dashboard-header").classList.add("hidden");
        document.getElementById("appFrame").style.height = "100vh";
        document.getElementById("appFrame").src = "/login.html";
    }
}

/* Shutdown safety */
window.addEventListener("beforeunload", function () {
    navigator.sendBeacon("/shutdown");
});
</script>

</body>
</html>
