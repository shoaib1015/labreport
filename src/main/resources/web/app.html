                <div onclick="loadPage('/master/lab.html')">Lab Profile</div>
                <div onclick="loadPage('/master/test-list.html')">Tests</div>
                <div onclick="loadPage('/master/doctor.html')">Doctors</div>
            </div>
        </div>

        <div class="menu-item">

            <div class="dropdown">

        <!-- <div class="menu-item">

            </div>

    </div>

    <!-- Main Iframe -->
        <iframe id="appFrame"
            src="/login.html"
            style="width:100%; height:100%; border:none; background:transparent;"
            allowTransparency="true">
        </iframe>
</div>

<script>
function loadPage(page) {
    document.getElementById("appFrame").src = page;
}

/* Called after successful login */
function showDashboard() {
    document.getElementById("dashboard-header").classList.remove("hidden");
    document.getElementById("appFrame").style.height = "calc(100vh - 50px)";
    enableRefreshLock();
}


/* Shutdown safety + refresh lock */
let lockRefresh = false;

function enableRefreshLock() { lockRefresh = true; }
function disableRefreshLock() { lockRefresh = false; }

window.addEventListener("beforeunload", function (e) {
    navigator.sendBeacon("/shutdown");
    if (lockRefresh) {
        e.preventDefault();
        e.returnValue = '';
        return '';
    }
});

window.addEventListener('keydown', function (e) {
    if (!lockRefresh) return;
    const isRefresh = e.key === 'F5' || ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'r');
    if (isRefresh) {
        e.preventDefault();
        e.stopPropagation();
    }
});
</script>
<script src="/js/sort-selects.js"></script>

</body>
</html>
